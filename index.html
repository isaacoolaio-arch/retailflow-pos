// ─── Audio Beep Utility ───────────────────────────────────────
// Uses Web Audio API — no external files, works fully offline

function playBeep(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    // Helper: play one short high-pitched pip
    function pip(startTime, duration) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = "sine";
      osc.frequency.setValueAtTime(2800, startTime);
      gain.gain.setValueAtTime(0.45, startTime);
      gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
      osc.start(startTime);
      osc.stop(startTime + duration);
      osc.onended = () => ctx.close();
    }

    const t = ctx.currentTime;
    const ON  = 0.045; // pip on-time
    const GAP = 0.055; // gap between pips

    if (type === "success") {
      // ti-ti  (two quick high pips)
      pip(t,           ON);
      pip(t + ON + GAP, ON);
    } else if (type === "error") {
      // Low descending tone — not found
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(400, t);
      osc.frequency.exponentialRampToValueAtTime(200, t + 0.3);
      gain.gain.setValueAtTime(0.35, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc.start(t);
      osc.stop(t + 0.3);
      osc.onended = () => ctx.close();
    } else if (type === "add") {
      // ti-ti-ti  (three quick high pips)
      pip(t,                   ON);
      pip(t + ON + GAP,         ON);
      pip(t + (ON + GAP) * 2,   ON);
    }
  } catch (e) { /* ignore if audio not supported */ }
}

// ─── IndexedDB Offline Cache ──────────────────────────────────

const DB_NAME = "OolaRetailFlowDB";
const DB_VERSION = 1;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains("products")) db.createObjectStore("products", { keyPath: "id" });
      if (!db.objectStoreNames.contains("pendingSales")) db.createObjectStore("pendingSales", { keyPath: "offlineId" });
      if (!db.objectStoreNames.contains("syncedSales")) db.createObjectStore("syncedSales", { keyPath: "id" });
      if (!db.objectStoreNames.contains("meta")) db.createObjectStore("meta", { keyPath: "key" });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbPut(storeName, data) {
  try {
    const db = await openDB();
    const tx = db.transaction(storeName, "readwrite");
    const store = tx.objectStore(storeName);
    if (Array.isArray(data)) { data.forEach(item => store.put(item)); }
    else { store.put(data); }
    return new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
  } catch (e) { console.warn("DB put failed:", e); }
}

async function dbGetAll(storeName) {
  try {
    const db = await openDB();
    const tx = db.transaction(storeName, "readonly");
    const store = tx.objectStore(storeName);
    return new Promise((res, rej) => {
      const req = store.getAll();
      req.onsuccess = () => res(req.result || []);
      req.onerror = () => rej(req.error);
    });
  } catch (e) { console.warn("DB getAll failed:", e); return []; }
}

async function dbDelete(storeName, key) {
  try {
    const db = await openDB();
    const tx = db.transaction(storeName, "readwrite");
    tx.objectStore(storeName).delete(key);
    return new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
  } catch (e) { console.warn("DB delete failed:", e); }
}

async function dbClear(storeName) {
  try {
    const db = await openDB();
    const tx = db.transaction(storeName, "readwrite");
    tx.objectStore(storeName).clear();
    return new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
  } catch (e) { console.warn("DB clear failed:", e); }
}

// ─── API Service ──────────────────────────────────────────────

const api = {
  isConfigured: () => !!API_URL,

  async get(action, params = {}) {
    if (!API_URL) return null;
    const url = new URL(API_URL);
    url.searchParams.set("action", action);
    Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));
    try {
      const res = await fetch(url.toString(), { redirect: "follow" });
      return await res.json();
    } catch (e) {
      console.warn("API GET failed:", e);
      return null;
    }
  },

  async post(action, data = {}) {
    if (!API_URL) return null;
    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action, ...data, deviceId: DEVICE_ID }),
        redirect: "follow"
      });
      return await res.json();
    } catch (e) {
      console.warn("API POST failed:", e);
      return null;
    }
  }
};

// ─── Sync Engine ──────────────────────────────────────────────

async function syncPendingSales() {
  if (!api.isConfigured()) return { synced: 0, pending: 0 };

  const pending = await dbGetAll("pendingSales");
  if (pending.length === 0) return { synced: 0, pending: 0 };

  try {
    const result = await api.post("syncSales", { sales: pending });
    if (result && result.success) {
      // Remove successfully synced sales from pending
      for (const r of (result.results || [])) {
        if (r.success && r.offlineId) {
          await dbDelete("pendingSales", r.offlineId);
        }
      }
      return { synced: result.synced || 0, pending: result.failed || 0 };
    }
  } catch (e) {
    console.warn("Sync failed:", e);
  }
  return { synced: 0, pending: pending.length };
}

// ─── Online Status Hook ───────────────────────────────────────

function useOnlineStatus() {
  const [online, setOnline] = useState(navigator.onLine);
  const [pendingCount, setPendingCount] = useState(0);
  const [lastSync, setLastSync] = useState(null);
  const [syncing, setSyncing] = useState(false);

  useEffect(() => {
    const goOnline = () => setOnline(true);
    const goOffline = () => setOnline(false);
    window.addEventListener("online", goOnline);
    window.addEventListener("offline", goOffline);
    return () => {
      window.removeEventListener("online", goOnline);
      window.removeEventListener("offline", goOffline);
    };
  }, []);

  // Check pending sales count periodically
  useEffect(() => {
    const check = async () => {
      try {
        const pending = await dbGetAll("pendingSales");
        setPendingCount(pending.length);
      } catch (e) { /* ignore */ }
    };
    check();
    const interval = setInterval(check, 5000);
    return () => clearInterval(interval);
  }, []);

  // Auto-sync when coming back online
  useEffect(() => {
    if (online && pendingCount > 0 && !syncing) {
      const doSync = async () => {
        setSyncing(true);
        const result = await syncPendingSales();
        if (result.synced > 0) {
          setLastSync(new Date());
          const remaining = await dbGetAll("pendingSales");
          setPendingCount(remaining.length);
        }
        setSyncing(false);
      };
      doSync();
    }
  }, [online, pendingCount]);

  return { online, pendingCount, lastSync, syncing, setPendingCount };
}

// ─── Data Loading Hook ────────────────────────────────────────

function useProducts() {
  const [products, setProducts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [source, setSource] = useState("loading"); // "api", "cache", "demo"

  useEffect(() => {
    const load = async () => {
      setLoading(true);

      // 1. Try loading from IndexedDB cache first (instant)
      try {
        const cached = await dbGetAll("products");
        if (cached.length > 0) {
          setProducts(cached);
          setSource("cache");
          setLoading(false);
        }
      } catch (e) { /* continue */ }

      // 2. Try fetching from API (background refresh)
      if (api.isConfigured()) {
        const result = await api.get("getProducts");
        if (result && result.success && result.products) {
          setProducts(result.products);
          setSource("api");
          // Cache products for offline
          await dbClear("products");
          await dbPut("products", result.products);
          await dbPut("meta", { key: "lastProductSync", value: new Date().toISOString() });
          setLoading(false);
          return;
        }
      }

      // 3. No API and no cache - start empty so user can add their own products
      setProducts([]);
      setSource("demo");
      setLoading(false);
    };
    load();
  }, []);

  const refreshProducts = async () => {
    if (!api.isConfigured()) return;
    const result = await api.get("getProducts");
    if (result && result.success && result.products) {
      setProducts(result.products);
      setSource("api");
      await dbClear("products");
      await dbPut("products", result.products);
    }
  };

  return { products, setProducts, loading, source, refreshProducts };
}

// ─── AI Camera Scanner Modal ──────────────────────────────────

function CameraScanModal({ products, onProductFound, onClose }) {
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null); // FIX: use ref so cleanup always has the live stream
  const [stream, setStream] = useState(null);
  const [scanning, setScanning] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const [capturedImage, setCapturedImage] = useState(null);
  const [cameraReady, setCameraReady] = useState(false);

  // Build product catalog for AI context
  const productCatalog = products.map(p => {
    const pricePart = p.type === "weight" ? `${p.pricePerKg}/kg` : p.type === "piece" ? `${p.pricePerPiece}/piece` : p.type === "variant" ? `variants` : `${p.price}`;
    return `${p.id}: ${p.name} (${p.type}, ${p.category}, ${pricePart})`;
  }).join("\n");

  useEffect(() => {
    let mounted = true;
    const startCamera = async () => {
      try {
        const mediaStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        if (mounted && videoRef.current) {
          videoRef.current.srcObject = mediaStream;
          streamRef.current = mediaStream; // FIX: store in ref immediately
          setStream(mediaStream);
          setCameraReady(true);
        } else {
          // Component unmounted before camera was ready — stop stream immediately
          mediaStream.getTracks().forEach(t => t.stop());
        }
      } catch (err) {
        if (mounted) setError("Camera access denied. Please allow camera permission.");
      }
    };
    startCamera();
    return () => {
      mounted = false;
      // FIX: use ref (not stale state) to reliably stop the stream
      if (streamRef.current) {
        streamRef.current.getTracks().forEach(t => t.stop());
        streamRef.current = null;
      }
    };
  }, []);

  const stopCamera = () => {
    if (streamRef.current) {
      streamRef.current.getTracks().forEach(t => t.stop());
      streamRef.current = null;
    }
  };

  const captureAndIdentify = async () => {
    if (!videoRef.current || !canvasRef.current) return;

    const video = videoRef.current;
    const canvas = canvasRef.current;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    const imageData = canvas.toDataURL("image/jpeg", 0.8);
    setCapturedImage(imageData);
    setScanning(true);
    setResult(null);
    setError(null);

    try {
      const base64 = imageData.split(",")[1];

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": (localStorage.getItem("anthropic_key") || ""),
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: [
              {
                type: "image",
                source: { type: "base64", media_type: "image/jpeg", data: base64 }
              },
              {
                type: "text",
                text: `You are a product identification system for a retail shop POS in Uganda. Look at this image and identify what product/food item it is.

Here are the products available in our shop inventory:
${productCatalog}

INSTRUCTIONS:
1. Look at the image carefully - it may show items in a clear polythene bag (cavera), on a scale, loose, or packaged.
2. Identify what the product is (sugar, beans, rice, irish potatoes, groundnuts, onions, tomatoes, maize flour, eggs, etc.)
3. Match it to the closest product ID from the inventory list above.
4. If you can estimate the weight or quantity from the image, include that.

Respond ONLY with this exact JSON format, no other text:
{"product_id": "W001", "product_name": "Sugar (Loose)", "confidence": "high", "estimated_weight_kg": 1.0, "estimated_pieces": null, "notes": "White granulated sugar in clear cavera bag, approximately 1kg"}

If confidence is low or you cannot identify: {"product_id": null, "product_name": null, "confidence": "low", "notes": "reason"}`
              }
            ]
          }]
        })
      });

      const data = await response.json();
      const text = (data.content ? data.content.map(c => c.text || "").join("") : "");
      const clean = text.replace(/```json|```/g, "").trim();

      try {
        const parsed = JSON.parse(clean);
        setResult(parsed);

        if (parsed.product_id && parsed.confidence !== "low") {
          const matchedProduct = products.find(p => p.id === parsed.product_id);
          if (matchedProduct) {
            setResult({ ...parsed, matched: matchedProduct });
          }
        }
      } catch {
        setError("Could not parse AI response. Try again.");
      }
    } catch (err) {
      setError("Failed to connect to AI. Check your internet connection.");
    }

    setScanning(false);
  };

  const handleConfirmProduct = () => {
    if ((result && result.matched)) {
      stopCamera();
      onProductFound(result.matched, result.estimated_weight_kg, result.estimated_pieces);
    }
  };

  const handleRetake = () => {
    setCapturedImage(null);
    setResult(null);
    setError(null);
  };

  const handleClose = () => {
    stopCamera();
    onClose();
  };

  return (
    <div className="fixed inset-0 bg-black z-50 flex flex-col">
      {/* Header */}
      <div className="flex items-center justify-between p-4 bg-black/80 backdrop-blur-sm z-10">
        <div className="flex items-center gap-2">
          <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center">
            <span className="text-sm">🤖</span>
          </div>
          <div>
            <h3 className="text-sm font-bold text-white">Smart Scanner</h3>
            <p className="text-xs text-zinc-400">AI Product Detection</p>
          </div>
        </div>
        <button onClick={handleClose} className="w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center text-zinc-300 hover:bg-zinc-700">
          <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>

      {/* Camera View */}
      <div className="flex-1 relative overflow-hidden bg-black">
        {!capturedImage ? (
          <>
            <video ref={videoRef} autoPlay playsInline muted className="w-full h-full object-cover" />
            {/* Scanning overlay frame */}
            <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
              <div className="w-64 h-64 relative">
                <div className="absolute top-0 left-0 w-10 h-10 border-t-4 border-l-4 border-cyan-400 rounded-tl-2xl" />
                <div className="absolute top-0 right-0 w-10 h-10 border-t-4 border-r-4 border-cyan-400 rounded-tr-2xl" />
                <div className="absolute bottom-0 left-0 w-10 h-10 border-b-4 border-l-4 border-cyan-400 rounded-bl-2xl" />
                <div className="absolute bottom-0 right-0 w-10 h-10 border-b-4 border-r-4 border-cyan-400 rounded-br-2xl" />
                {cameraReady && (
                  <div className="absolute inset-0 flex items-center justify-center">
                    <p className="text-cyan-300 text-sm font-medium bg-black/50 px-3 py-1 rounded-full">
                      Point at product
                    </p>
                  </div>
                )}
              </div>
            </div>
          </>
        ) : (
          <img src={capturedImage} className="w-full h-full object-cover" alt="Captured" />
        )}

        {/* Scanning animation overlay */}
        {scanning && (
          <div className="absolute inset-0 bg-black/50 flex flex-col items-center justify-center">
            <div className="w-16 h-16 rounded-full border-4 border-cyan-400 border-t-transparent animate-spin mb-4" />
            <p className="text-cyan-300 font-semibold text-lg">Identifying product...</p>
            <p className="text-zinc-400 text-sm mt-1">AI is analyzing the image</p>
          </div>
        )}
      </div>

      <canvas ref={canvasRef} className="hidden" />

      {/* Results / Actions Panel */}
      <div className="bg-zinc-900 border-t border-zinc-800 p-4 space-y-3">
        {error && (
          <div className="bg-red-500/10 border border-red-500/30 rounded-xl p-3 flex items-center gap-2">
            <span className="text-red-400">⚠️</span>
            <p className="text-sm text-red-300 flex-1">{error}</p>
            <button onClick={handleRetake} className="text-xs text-red-400 underline">Retry</button>
          </div>
        )}

        {result && !error && (
          <div className={`rounded-xl p-4 border ${
            result.confidence === "high" ? "bg-emerald-500/10 border-emerald-500/30" :
            result.confidence === "medium" ? "bg-amber-500/10 border-amber-500/30" :
            "bg-red-500/10 border-red-500/30"
          }`}>
            {result.matched ? (
              <div className="flex items-center gap-3">
                <span className="text-3xl">{result.matched.image}</span>
                <div className="flex-1">
                  <div className="flex items-center gap-2">
                    <p className="text-lg font-bold text-zinc-100">{result.matched.name}</p>
                    <span className={`px-2 py-0.5 rounded-full text-xs font-semibold ${
                      result.confidence === "high" ? "bg-emerald-500/20 text-emerald-400" : "bg-amber-500/20 text-amber-400"
                    }`}>{result.confidence === "high" ? "✓ Sure" : "~ Maybe"}</span>
                  </div>
                  <p className="text-sm text-zinc-400 mt-0.5">{result.notes}</p>
                  {result.estimated_weight_kg && (
                    <p className="text-sm text-cyan-400 mt-1 font-medium">Est. weight: ~{result.estimated_weight_kg}kg</p>
                  )}
                  {result.estimated_pieces && (
                    <p className="text-sm text-cyan-400 mt-1 font-medium">Est. count: ~{result.estimated_pieces} pieces</p>
                  )}
                </div>
              </div>
            ) : (
              <div className="text-center">
                <p className="text-zinc-300 font-medium">Could not identify product</p>
                <p className="text-sm text-zinc-500 mt-1">{result.notes || "Try taking a clearer photo"}</p>
              </div>
            )}
          </div>
        )}

        {/* Action Buttons */}
        <div className="flex gap-3">
          {!capturedImage ? (
            <button onClick={captureAndIdentify} disabled={!cameraReady || scanning}
              className={`flex-1 py-4 rounded-2xl font-bold text-lg transition-all active:scale-95 flex items-center justify-center gap-2 ${
                cameraReady && !scanning
                  ? "bg-gradient-to-r from-cyan-500 to-blue-500 text-white shadow-lg shadow-cyan-500/30"
                  : "bg-zinc-800 text-zinc-500 cursor-not-allowed"
              }`}>
              <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/>
              </svg>
              {scanning ? "Scanning..." : "Snap & Identify"}
            </button>
          ) : (
            <>
              <button onClick={handleRetake}
                className="flex-1 py-4 rounded-2xl bg-zinc-800 text-zinc-300 font-bold text-lg hover:bg-zinc-700 active:scale-95 transition-all">
                ↻ Retake
              </button>
              {(result && result.matched) && (
                <button onClick={handleConfirmProduct}
                  className="flex-1 py-4 rounded-2xl bg-gradient-to-r from-emerald-500 to-teal-500 text-white font-bold text-lg shadow-lg shadow-emerald-500/30 active:scale-95 transition-all">
                  ✓ Add {result.matched.name}
                </button>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}


// ─── AI Snap Modal (for Add Product form) ────────────────────
// Snaps a photo → asks Claude to identify the item → auto-fills
// name, category, emoji, and weight_kg / piece_count estimate.

function AISnapModal({ productType, onFill, onClose }) {
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null);
  const [cameraReady, setCameraReady] = useState(false);
  const [capturedImage, setCapturedImage] = useState(null);
  const [scanning, setScanning] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);

  // Start camera on mount
  useEffect(() => {
    let mounted = true;
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } })
      .then(stream => {
        if (!mounted) { stream.getTracks().forEach(t => t.stop()); return; }
        streamRef.current = stream;
        if (videoRef.current) videoRef.current.srcObject = stream;
        setCameraReady(true);
      })
      .catch(() => {
        if (mounted) setError("Camera access denied. Please allow camera permission.");
      });
    return () => {
      mounted = false;
      if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; }
    };
  }, []);

  const stopCamera = () => {
    if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; }
  };

  const snapAndIdentify = async () => {
    // Check for API key - prompt user if not saved yet
    let apiKey = localStorage.getItem("anthropic_key");
    if (!apiKey) {
      apiKey = window.prompt("Enter your Anthropic API key to use AI Snap:\n(starts with sk-ant-...)\n\nYour key is saved only on this device, never uploaded anywhere.");
      if (!apiKey || !apiKey.trim()) return;
      localStorage.setItem("anthropic_key", apiKey.trim());
    }
    if (!videoRef.current || !canvasRef.current) return;
    const video = videoRef.current;
    const canvas = canvasRef.current;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext("2d").drawImage(video, 0, 0);
    const imageData = canvas.toDataURL("image/jpeg", 0.8);
    setCapturedImage(imageData);
    setScanning(true);
    setResult(null);
    setError(null);

    try {
      const base64 = imageData.split(",")[1];
      const typeHint = productType === "weight" ? "This is a BY WEIGHT product (sold per kg). Focus on estimating weight." :
                       productType === "piece"  ? "This is a BY PIECE product (sold per piece/count). Focus on counting pieces." :
                                                  "This is a BARCODED packaged product.";

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": localStorage.getItem("anthropic_key") || "",
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-haiku-4-5-20251001",
          max_tokens: 500,
          messages: [{
            role: "user",
            content: [
              { type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64 } },
              { type: "text", text: `You are helping a shopkeeper in Uganda add a new product to their retail inventory system.
${typeHint}

Look at this image carefully and identify what item it is.

Return ONLY this exact JSON — no extra text, no markdown:
{
  "name": "Sugar (Loose)",
  "category": "Grocery",
  "emoji": "🍚",
  "estimated_weight_kg": 1.0,
  "estimated_pieces": null,
  "suggested_type": "weight",
  "notes": "White granulated sugar in a clear polythene bag, approximately 1kg"
}

Rules:
- name: short product name as sold in a Ugandan shop
- category: one of [Grocery, Beverages, Bakery, Dairy, Household, Personal Care, Snacks, Fresh Produce, Ready Food, Spices, Other]
- emoji: single most fitting emoji for this product
- estimated_weight_kg: number if it looks like a weight item, else null
- estimated_pieces: number if countable, else null  
- suggested_type: "weight" if sold by kg, "piece" if sold per piece/count, "barcode" if it's a packaged product with a barcode
- notes: brief description of what you see` }
            ]
          }]
        })
      });

      const data = await response.json();
      // Check for API errors (auth, quota, etc.)
      if (data.error) {
        if (data.error.type === "authentication_error") {
          localStorage.removeItem("anthropic_key");
          setError("Invalid API key. Tap Retake and re-enter your key.");
        } else {
          setError("AI error: " + (data.error.message || data.error.type || JSON.stringify(data.error)));
        }
        setScanning(false);
        return;
      }
      // Extract raw text from response
      const rawText = (data.content || []).map(c => c.text || "").join("").trim();
      // Robustly extract JSON - find first { ... } block
      const jsonMatch = rawText.match(/\{[\s\S]*\}/);
      if (!jsonMatch) {
        setError("Bad response: " + rawText.slice(0, 120));
        setScanning(false);
        return;
      }
      try {
        const parsed = JSON.parse(jsonMatch[0]);
        setResult(parsed);
      } catch (parseErr) {
        setError("Parse error: " + jsonMatch[0].slice(0, 120));
      }
    } catch (e) {
      setError("Network error: " + (e.message || e.toString()));
    }
    setScanning(false);
  };

  const handleRetake = () => { setCapturedImage(null); setResult(null); setError(null); };

  const handleUseResult = () => {
    if (!result) return;
    stopCamera();
    onFill(result);
  };

  return (
    <div className="fixed inset-0 bg-black z-50 flex flex-col">
      {/* Header */}
      <div className="flex items-center justify-between p-4 bg-zinc-950 border-b border-zinc-800">
        <div className="flex items-center gap-2">

function BarcodeScannerModal({ onScan, onClose }) {
  // Use a unique ID per mount so stale instances from a previous open never collide
  const uid = useRef("bcs_" + Math.random().toString(36).substr(2, 6));
  const instanceRef = useRef(null);
  const [status, setStatus] = useState("starting"); // "starting" | "scanning" | "error"
  const [errorMsg, setErrorMsg] = useState("");

  const stopScanner = useCallback(function() {
    if (instanceRef.current) {
      try { instanceRef.current.stop().catch(function(){}); } catch(e) {}
      instanceRef.current = null;
    }
  }, []);

  const startScanner = useCallback(function() {
    setStatus("starting");
    setErrorMsg("");

    // Guard: Html5Qrcode library must be loaded
    if (typeof Html5Qrcode === "undefined") {
      setStatus("error");
      setErrorMsg("Scanner library not loaded. Check your internet connection and reload the page.");
      return;
    }

    // Guard: camera API must exist
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      setStatus("error");
      setErrorMsg("Your browser does not support camera access. Use Chrome or Safari on a phone.");
      return;
    }

    // Small delay so React has painted the div into the DOM
    setTimeout(function() {
      var el = document.getElementById(uid.current);
      if (!el) {
        setStatus("error");
        setErrorMsg("Scanner element not found. Please close and try again.");
        return;
      }

      try {
        var scanner = new Html5Qrcode(uid.current);
        instanceRef.current = scanner;

        scanner.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: { width: 260, height: 130 }, aspectRatio: 1.777 },
          function(decodedText) {
            stopScanner();
            onScan(decodedText);
          },
          function() { /* per-frame misses — ignore */ }
        ).then(function() {
          setStatus("scanning");
        }).catch(function(err) {
          var msg = String(err || "");
          if (msg.toLowerCase().includes("permission") || msg.toLowerCase().includes("denied")) {
            setErrorMsg("Camera permission denied. Tap the camera icon in your browser address bar and allow access, then retry.");
          } else if (msg.toLowerCase().includes("https") || msg.toLowerCase().includes("secure")) {
            setErrorMsg("Camera requires a secure (HTTPS) connection. Make sure you're on https://");
          } else if (msg.toLowerCase().includes("notfound") || msg.toLowerCase().includes("no camera")) {
            setErrorMsg("No camera found on this device.");
          } else {
            setErrorMsg("Could not start camera: " + (msg || "unknown error") + ". Try closing other apps using the camera.");
          }
          setStatus("error");
        });
      } catch(e) {
        setStatus("error");
        setErrorMsg("Scanner failed to initialise: " + String(e.message || e));
      }
    }, 120);
  }, [onScan, stopScanner]);

  useEffect(function() {
    startScanner();
    return stopScanner;
  }, []);

  return (
    <div className="fixed inset-0 bg-black z-50 flex flex-col">
      {/* Header */}
      <div className="flex items-center justify-between p-4 bg-zinc-950 border-b border-zinc-800">
        <div>
          <h3 className="text-sm font-bold text-white">Barcode Scanner</h3>
          <p className="text-xs text-zinc-400">
            {status === "scanning" ? "📷 Point camera at barcode" :
             status === "error"    ? "⚠ Scanner error" :
                                     "Starting camera..."}
          </p>
        </div>
        <button onClick={function() { stopScanner(); onClose(); }}
          className="w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center text-zinc-300 text-lg">✕</button>
      </div>

      {/* Camera viewport — the div Html5Qrcode renders into */}
      <div className="flex-1 flex items-center justify-center bg-black overflow-hidden">
        <div id={uid.current} style={{width:"100%", maxWidth:"500px"}} />
      </div>

      {/* Status bar */}
      {status === "starting" && (
        <div className="p-4 bg-zinc-900 border-t border-zinc-800 flex items-center justify-center gap-3">
          <div className="w-5 h-5 border-2 border-cyan-500 border-t-transparent rounded-full animate-spin" />
          <p className="text-sm text-zinc-400">Requesting camera permission...</p>
        </div>
      )}

      {status === "scanning" && (
        <div className="p-4 bg-zinc-900 border-t border-zinc-800 text-center">
          <p className="text-xs text-zinc-500">Hold steady — scanner will beep when it reads a barcode</p>
        </div>
      )}

      {status === "error" && (
        <div className="p-4 bg-red-950/60 border-t border-red-500/30 space-y-3">
          <p className="text-sm text-red-300 text-center leading-relaxed">{errorMsg}</p>
          <div className="flex gap-2">
            <button onClick={function() { stopScanner(); startScanner(); }}
              className="flex-1 py-2.5 rounded-xl bg-cyan-500/20 text-cyan-400 font-bold text-sm border border-cyan-500/30 active:scale-95 transition-all">
              ↻ Retry
            </button>
            <button onClick={function() { stopScanner(); onClose(); }}
              className="flex-1 py-2.5 rounded-xl bg-zinc-800 text-zinc-300 font-medium text-sm active:scale-95 transition-all">
              Close
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function POSScreen({ products, cart, setCart, onComplete }) {

  const [barcodeInput, setBarcodeInput] = useState("");

  const [notFoundMsg, setNotFoundMsg] = useState(""); // FIX: replace alert() with inline message
  const [favourites] = useState(["W001", "PC01", "W003", "PC05", "V002", "V004"]);

  // FIX: compute categories dynamically from actual loaded products (not static MOCK_PRODUCTS)
  const allCategories = React.useMemo(
    () => ["All", "Favourites", ...new Set(products.map(p => p.category))],
    [products]
  );

  const addBarcodeProduct = useCallback((product) => {
    playBeep("add"); // 🔔 beep: item added to cart
    setCart(prev => {
      const key = product.id;
      const exists = prev.find(c => c.cartKey === key);
      if (exists) return prev.map(c => c.cartKey === key ? { ...c, qty: c.qty + 1, lineTotal: (c.qty + 1) * c.unitPrice } : c);
      return [...prev, { cartKey: key, id: product.id, name: product.name, image: product.image, qty: 1, unitPrice: product.price, lineTotal: product.price, unit: product.unit, type: "barcode", cost: product.cost }];
    });
  }, [setCart]);

  const addWeightProduct = (product, weight, total) => {
    playBeep("add");
    const key = `${product.id}_${Date.now()}`;
    setCart(prev => [...prev, { cartKey: key, id: product.id, name: `${product.name} (${weight}kg)`, image: product.image, qty: 1, unitPrice: total, lineTotal: total, unit: `${weight}kg`, type: "weight", weight, cost: product.cost * weight }]);
    setWeightModal(null);
  };

  const addPieceProduct = (product, count, total) => {
    playBeep("add");
    setCart(prev => {
      const key = product.id;
      const exists = prev.find(c => c.cartKey === key);
      if (exists) { const newQty = exists.qty + count; return prev.map(c => c.cartKey === key ? { ...c, qty: newQty, lineTotal: newQty * c.unitPrice } : c); }
      return [...prev, { cartKey: key, id: product.id, name: product.name, image: product.image, qty: count, unitPrice: product.pricePerPiece, lineTotal: total, unit: "pcs", type: "piece", cost: product.cost }];
    });
    setPieceModal(null);
  };

  const addVariantProduct = (product, variantIdx, qty, total) => {
    playBeep("add");
    const variant = product.variants[variantIdx];
    const key = `${product.id}_v${variantIdx}`;
    setCart(prev => {
      const exists = prev.find(c => c.cartKey === key);
      if (exists) { const newQty = exists.qty + qty; return prev.map(c => c.cartKey === key ? { ...c, qty: newQty, lineTotal: newQty * c.unitPrice } : c); }
      return [...prev, { cartKey: key, id: product.id, name: `${product.name} — ${variant.label}`, image: product.image, qty, unitPrice: variant.price, lineTotal: total, unit: variant.unit, type: "variant", cost: product.cost }];
    });
    setVariantModal(null);
  };

  const handleProductTap = (product) => {
    switch (product.type) {
      case "barcode": addBarcodeProduct(product); break;
      case "weight": setWeightModal(product); break;
      case "piece": setPieceModal(product); break;
      case "variant": setVariantModal(product); break;

  // AI Camera identified a product

    switch (product.type) {

    const query = barcodeInput.trim();
    let found = products.find(p => p.barcode && p.barcode === query);
    if (!found) found = products.find(p => p.id.toLowerCase() === query.toLowerCase());
    if (!found) found = products.find(p => p.name.toLowerCase().includes(query.toLowerCase()));
    if (found) {
      playBeep("success"); // ✅ beep: product found

      setBarcodeInput("");
      setNotFoundMsg("");

    setCart(prev => prev.map(c => {

              <p className="text-2xl font-bold text-amber-400" style={{ fontFamily: "'DM Sans', sans-serif" }}>{formatUGX(cartTotal)}</p>
            </div>
            <button onClick={() => setCart([])} className="px-3 py-3 rounded-xl bg-zinc-800 text-zinc-400 font-medium hover:bg-zinc-700 active:scale-95 transition-all text-sm">Clear</button>
            <button onClick={onComplete} className="px-6 py-3 rounded-xl bg-gradient-to-r from-amber-500 to-orange-500 text-zinc-900 font-bold hover:from-amber-400 hover:to-orange-400 active:scale-95 transition-all shadow-lg shadow-amber-500/20 text-lg">Pay →</button>
          </div>
        </div>
      )}

      {showBarcodeScanner && <BarcodeScannerModal onScan={function(code) { setShowBarcodeScanner(false); setBarcodeInput(code); var found = products.find(function(p){return p.barcode && p.barcode === code;}); if(found){ playBeep("success"); handleProductTap(found); } else { playBeep("error"); setNotFoundMsg("Scanned: " + code + " — not found. Add it in Stock tab."); setTimeout(function(){ setNotFoundMsg(""); }, 4000); } }} onClose={function(){setShowBarcodeScanner(false);}} />}
      {weightModal && <WeightEntryModal product={weightModal} onAdd={(w, t) => addWeightProduct(weightModal, w, t)} onClose={() => setWeightModal(null)} />}
      {pieceModal && <PieceEntryModal product={pieceModal} onAdd={(c, t) => addPieceProduct(pieceModal, c, t)} onClose={() => setPieceModal(null)} />}
      {variantModal && <VariantModal product={variantModal} onAdd={(vi, q, t) => addVariantProduct(variantModal, vi, q, t)} onClose={() => setVariantModal(null)} />}
      {showCamera && <CameraScanModal products={products} onProductFound={handleCameraProduct} onClose={() => setShowCamera(false)} />}
    </div>
  );
}

function InventoryScreen({ products, setProducts }) {
  const [search, setSearch] = useState("");
  const [filterType, setFilterType] = useState("all");
  const [sortBy, setSortBy] = useState("name");
  const [editingId, setEditingId] = useState(null);
  const [editValue, setEditValue] = useState("");
  const [showAddForm, setShowAddForm] = useState(false);
  const [showInvScanner, setShowInvScanner] = useState(false); // ✅ proper modal state
  const [showAISnap, setShowAISnap] = useState(false); // ✅ AI snap for add form
  const [np, setNp] = useState({name:"",type:"barcode",category:"General",price:"",cost:"",stock:"",barcode:"",unit:"pc",image:"📦",pricePerKg:"",pricePerPiece:""});

  const getStock = (p) => p.type === "variant" ? p.variants.reduce((s, v) => s + v.stock, 0) : (p.stock || 0);
  const getPrice = (p) => p.type === "weight" ? p.pricePerKg : p.type === "piece" ? p.pricePerPiece : p.type === "variant" ? (p.variants && p.variants[0] ? p.variants[0].price : 0) : p.price;

  const filtered = products
    .filter(p => filterType === "all" || p.type === filterType)
    .filter(p => p.name.toLowerCase().includes(search.toLowerCase()))
    .sort((a, b) => sortBy === "name" ? a.name.localeCompare(b.name) : sortBy === "stock-low" ? getStock(a) - getStock(b) : getPrice(b) - getPrice(a));

  const lowStockCount = products.filter(p => getStock(p) <= 10).length;
  const totalValue = products.reduce((s, p) => s + getPrice(p) * getStock(p), 0);

  const handleStockSave = (id) => {
    const val = parseInt(editValue);
    if (!isNaN(val) && val >= 0 && setProducts) {
      playBeep("add"); // 🔔 beep: stock updated
      setProducts(prev => prev.map(p => {
        if (p.id !== id) return p;
        // FIX: variant products store stock inside each variant, not at top level
        if (p.type === "variant") {
          // Distribute new total evenly across variants (or just update first variant
          // if editing from the summary row). Show total across all variants.
          const perVariant = Math.floor(val / p.variants.length);
          const remainder = val % p.variants.length;
          return {
            ...p,
            variants: p.variants.map((v, i) => ({
              ...v,
              stock: perVariant + (i === 0 ? remainder : 0)
            }))
          };
        }
        return { ...p, stock: val };
      }));
    }
    setEditingId(null); setEditValue("");
  };

  const handleAddProduct = () => {
    if (!np.name.trim() || !setProducts) return;
    playBeep("success"); // 🔔 beep: new product saved
    const prefix = np.type === "weight" ? "W" : np.type === "piece" ? "PC" : "P";
    const newP = {
      id: prefix + String(Date.now()).slice(-4), type: np.type, barcode: np.barcode || "",
      name: np.name, category: np.category || "General", cost: Number(np.cost) || 0,
      stock: Number(np.stock) || 0, unit: np.type === "weight" ? "kg" : np.type === "piece" ? "pcs" : "pc",
      image: np.image || "📦"
    };
    if (np.type === "barcode") newP.price = Number(np.price) || 0;
    if (np.type === "weight") { newP.pricePerKg = Number(np.pricePerKg) || 0; newP.minWeight = 0.25; newP.weightStep = 0.25; }
    if (np.type === "piece") newP.pricePerPiece = Number(np.pricePerPiece) || 0;
    setProducts(prev => [...prev, newP]);
    setNp({name:"",type:"barcode",category:"General",price:"",cost:"",stock:"",barcode:"",unit:"pc",image:"📦",pricePerKg:"",pricePerPiece:""});
    setShowAddForm(false);
  };

  const emojis = ["📦","🥤","🍞","🧴","🧼","🪥","🍪","🍺","🥛","🍚","🌾","🥔","🫘","🌽","🥜","🧅","🍅","🥚","🌯","🍩","🫓","🍌","🧈","🫗","🧂","🧹"];

  return (
    <div className="flex flex-col h-full">
      <div className="px-4 pt-4 pb-2 grid grid-cols-3 gap-2">
        <div className="bg-zinc-800/60 rounded-xl p-3 border border-zinc-700/30">
          <p className="text-xs text-zinc-500">Products</p>
          <p className="text-xl font-bold text-zinc-100">{products.length}</p>
        </div>
        <div className="bg-zinc-800/60 rounded-xl p-3 border border-zinc-700/30">
          <p className="text-xs text-zinc-500">Stock Value</p>
          <p className="text-lg font-bold text-amber-400">{(totalValue / 1000000).toFixed(1)}M</p>
        </div>
        <div className={`rounded-xl p-3 border ${lowStockCount > 0 ? "bg-red-500/10 border-red-500/20" : "bg-emerald-500/10 border-emerald-500/20"}`}>
          <p className="text-xs text-zinc-500">Low Stock</p>
          <p className={`text-xl font-bold ${lowStockCount > 0 ? "text-red-400" : "text-emerald-400"}`}>{lowStockCount}</p>
        </div>
      </div>

      <div className="px-4 py-2 flex gap-2">
        <div className="flex-1"><SearchInput value={search} onChange={setSearch} placeholder="Search inventory..." /></div>
        <button onClick={() => setShowAddForm(!showAddForm)} className="px-3 bg-amber-500 text-zinc-900 rounded-xl font-bold hover:bg-amber-400 active:scale-95 transition-all text-sm">+ Add</button>
        <select value={sortBy} onChange={e => setSortBy(e.target.value)} className="bg-zinc-800 border border-zinc-700/50 rounded-xl px-2 py-2 text-xs text-zinc-300 focus:outline-none">
          <option value="name">A-Z</option><option value="stock-low">Stock ↑</option><option value="price">Price ↓</option>
        </select>
      </div>

      {showAddForm && (
        <div className="fixed inset-0 z-50 bg-black/70 flex flex-col justify-end" onClick={e => { if(e.target === e.currentTarget) setShowAddForm(false); }}>
          <div className="bg-zinc-900 rounded-t-2xl max-h-[90vh] flex flex-col">
            {/* Fixed header */}
            <div className="flex items-center justify-between px-4 pt-4 pb-3 border-b border-zinc-800 flex-shrink-0">
              <h3 className="text-base font-bold text-amber-400">Add New Product</h3>
              <button onClick={() => setShowAISnap(true)}
                className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-gradient-to-r from-violet-500/20 to-purple-500/20 border border-violet-500/40 text-violet-300 text-xs font-bold active:scale-95 transition-all">
                <svg width="13" height="13" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
                🤖 AI Snap
              </button>
            </div>

            {/* Scrollable body */}
            <div className="overflow-y-auto flex-1 px-4 py-3 space-y-3">
              {np.aiEstimate && (
                <div className="flex items-center gap-2 bg-violet-500/10 border border-violet-500/30 rounded-lg px-3 py-2">
                  <span className="text-violet-400 text-sm">🤖</span>
                  <p className="text-xs text-violet-300 flex-1">{np.aiEstimate}</p>
                  <button onClick={() => setNp(prev => ({...prev, aiEstimate: ""}))} className="text-zinc-500 text-xs">✕</button>
                </div>
              )}
              <div className="grid grid-cols-2 gap-2">
                <input type="text" value={np.name} onChange={e => setNp({...np, name: e.target.value})} placeholder="Product name" className="col-span-2 bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2.5 text-sm text-zinc-200 placeholder-zinc-500 focus:outline-none focus:border-amber-500" />
                <select value={np.type} onChange={e => setNp({...np, type: e.target.value})} className="bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2.5 text-sm text-zinc-200">
                  <option value="barcode">📦 Barcoded</option><option value="weight">⚖️ By Weight</option><option value="piece">🔢 By Piece</option>
                </select>
                <input type="text" value={np.category} onChange={e => setNp({...np, category: e.target.value})} placeholder="Category" className="bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2.5 text-sm text-zinc-200 placeholder-zinc-500 focus:outline-none" />
                {np.type === "barcode" && <input type="number" value={np.price} onChange={e => setNp({...np, price: e.target.value})} placeholder="Sell Price (UGX)" className="bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2.5 text-sm text-zinc-200 placeholder-zinc-500 focus:outline-none" />}
                {np.type === "weight" && <input type="number" value={np.pricePerKg} onChange={e => setNp({...np, pricePerKg: e.target.value})} placeholder="Price/Kg (UGX)" className="bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2.5 text-sm text-zinc-200 placeholder-zinc-500 focus:outline-none" />}
                {np.type === "piece" && <input type="number" value={np.pricePerPiece} onChange={e => setNp({...np, pricePerPiece: e.target.value})} placeholder="Price/Piece (UGX)" className="bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2.5 text-sm text-zinc-200 placeholder-zinc-500 focus:outline-none" />}
                <input type="number" value={np.cost} onChange={e => setNp({...np, cost: e.target.value})} placeholder="Cost Price" className="bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2.5 text-sm text-zinc-200 placeholder-zinc-500 focus:outline-none" />
                <input type="number" value={np.stock} onChange={e => setNp({...np, stock: e.target.value})} placeholder="Stock Qty" className="bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2.5 text-sm text-zinc-200 placeholder-zinc-500 focus:outline-none" />
                <div className="col-span-2 flex gap-2">
                  <input type="text" value={np.barcode} onChange={e => setNp({...np, barcode: e.target.value})} placeholder="Barcode number" className="flex-1 bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2.5 text-sm text-zinc-200 placeholder-zinc-500 focus:outline-none" />
                  <button type="button" onClick={() => setShowInvScanner(true)}
                    className="px-3 bg-cyan-500 text-white rounded-lg font-bold text-sm active:scale-95 flex items-center gap-1">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg>
                    Scan
                  </button>
                </div>
              </div>
              <div className="flex gap-1 flex-wrap">{emojis.map(em => (
                <button key={em} onClick={() => setNp({...np, image: em})} className={`w-8 h-8 rounded-lg text-lg flex items-center justify-center ${np.image === em ? "bg-amber-500/30 border border-amber-500" : "bg-zinc-800 hover:bg-zinc-700"}`}>{em}</button>
              ))}</div>
            </div>

            {/* Fixed footer buttons - always visible */}
            <div className="flex gap-3 px-4 py-4 border-t border-zinc-800 flex-shrink-0">
              <button onClick={() => setShowAddForm(false)} className="flex-1 py-3.5 rounded-xl bg-zinc-700 text-zinc-300 font-semibold text-sm active:scale-95">Cancel</button>
              <button onClick={handleAddProduct} disabled={!np.name.trim()} className="flex-1 py-3.5 rounded-xl bg-amber-500 text-zinc-900 font-bold text-sm active:scale-95 disabled:opacity-40">Save Product</button>
            </div>
          </div>
        </div>
      )}

      <div className="px-4 pb-2 flex gap-2 overflow-x-auto">
        {[{ id: "all", label: "All", icon: "📋" }, { id: "barcode", label: "Barcoded", icon: "📦" }, { id: "weight", label: "By Weight", icon: "⚖️" }, { id: "piece", label: "By Piece", icon: "🔢" }, { id: "variant", label: "Variants", icon: "📐" }].map(t => (
          <button key={t.id} onClick={() => setFilterType(t.id)}
            className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-all whitespace-nowrap flex items-center gap-1 ${
              filterType === t.id ? "bg-amber-500/20 text-amber-400 border border-amber-500/30" : "bg-zinc-800/60 text-zinc-500 border border-zinc-700/30 hover:text-zinc-300"
            }`}><span>{t.icon}</span> {t.label}</button>
        ))}
      </div>

      <div className="flex-1 overflow-y-auto px-4 pb-4 space-y-2">
        {filtered.map(p => {
          const typeInfo = TYPE_LABELS[p.type];
          const stock = getStock(p);
          const isEditing = editingId === p.id;
          return (
            <div key={p.id} className="bg-zinc-800/40 rounded-xl border border-zinc-700/30 p-3 flex items-center gap-3">
              <span className="text-2xl w-9 text-center">{p.image}</span>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2">
                  <p className="text-sm text-zinc-200 font-medium truncate">{p.name}</p>
                  <span className={`px-1.5 py-0.5 rounded text-xs font-semibold border ${typeInfo.color}`} style={{ fontSize: "9px" }}>{typeInfo.icon} {typeInfo.label}</span>
                </div>
                <p className="text-xs text-zinc-500 mt-0.5">
                  {p.type === "variant" ? p.variants.map(v => v.label + ": " + v.stock).join(" · ") :
                   p.type === "weight" ? formatUGX(p.pricePerKg) + "/kg · " + p.category :
                   p.type === "piece" ? formatUGX(p.pricePerPiece) + "/pc · " + p.category :
                   formatUGX(p.price) + " · " + p.category}
                </p>
              </div>
              {isEditing ? (
                <div className="flex items-center gap-1">
                  <input type="number" value={editValue} onChange={e => setEditValue(e.target.value)} onKeyDown={e => { if(e.key==="Enter") handleStockSave(p.id); }} autoFocus className="w-16 bg-zinc-700 border border-amber-500/50 rounded-lg px-2 py-1 text-sm text-center text-zinc-100 focus:outline-none" />
                  <button onClick={() => handleStockSave(p.id)} className="w-7 h-7 rounded-lg bg-amber-500/20 text-amber-400 flex items-center justify-center text-sm font-bold">✓</button>
                  <button onClick={() => {setEditingId(null);setEditValue("");}} className="w-7 h-7 rounded-lg bg-zinc-700 text-zinc-400 flex items-center justify-center text-sm">✕</button>
                </div>
              ) : (
                <button onClick={() => {setEditingId(p.id);setEditValue(String(stock));}}
                  className={`px-3 py-1.5 rounded-lg font-bold text-sm border ${stock <= 5 ? "bg-red-500/10 border-red-500/30 text-red-400" : stock <= 15 ? "bg-yellow-500/10 border-yellow-500/30 text-yellow-400" : "bg-zinc-700/50 border-zinc-600/30 text-zinc-300"}`}>
                  {stock} {p.unit}
                </button>
              )}
            </div>
          );
        })}
      </div>

      {/* ✅ Proper barcode scanner modal — same component as POS, works on all phones */}
      {showInvScanner && (
        <BarcodeScannerModal
          onScan={function(code) {
            setShowInvScanner(false);
            playBeep("success");
            setNp(function(prev) { return Object.assign({}, prev, { barcode: code }); });
          }}
          onClose={function() { setShowInvScanner(false); }}
        />
      )}

      {/* ✅ AI Snap modal — identifies new product and fills the form */}
      {showAISnap && (
        <AISnapModal
          productType={np.type}
          onFill={function(aiResult) {
            setShowAISnap(false);
            playBeep("success");
            // Build a human-readable estimate note to show in the form
            let estimateNote = "";
            if (aiResult.estimated_weight_kg) estimateNote = `AI estimated ~${aiResult.estimated_weight_kg} kg — update Stock Qty`;
            else if (aiResult.estimated_pieces) estimateNote = `AI estimated ~${aiResult.estimated_pieces} pieces — update Stock Qty`;

            setNp(function(prev) {
              const updated = {
                ...prev,
                name: aiResult.name || prev.name,
                category: aiResult.category || prev.category,
                image: aiResult.emoji || prev.image,
                aiEstimate: estimateNote,
              };
              // Auto-switch type if AI suggests a different one and user hasn't typed prices yet
              if (aiResult.suggested_type && !prev.price && !prev.pricePerKg && !prev.pricePerPiece) {
                updated.type = aiResult.suggested_type;
              }
              // Pre-fill stock with AI estimate
              if (aiResult.estimated_weight_kg && updated.type === "weight") {
                updated.stock = String(aiResult.estimated_weight_kg);
              } else if (aiResult.estimated_pieces && updated.type === "piece") {
                updated.stock = String(aiResult.estimated_pieces);
              }
              return updated;
            });
          }}
          onClose={function() { setShowAISnap(false); }}
        />
      )}
    </div>
  );
}

function HistoryScreen({ sales }) {
  const todayTotal = sales.reduce((s, sale) => s + sale.total, 0);
  const todayProfit = sales.reduce((s, sale) => s + sale.items.reduce((p, i) => p + ((i.unitPrice - (i.cost || 0)) * i.qty), 0), 0);

  return (
    <div className="flex flex-col h-full">
      <div className="p-4">
        <div className="bg-gradient-to-br from-amber-500/10 to-orange-500/10 rounded-2xl border border-amber-500/20 p-5">
          <p className="text-xs text-amber-400/70 uppercase tracking-wider mb-1">Today's Sales</p>
          <p className="text-3xl font-bold text-amber-400" style={{ fontFamily: "'DM Sans', sans-serif" }}>{formatUGX(todayTotal)}</p>
          <div className="flex gap-4 mt-3">
            <div><p className="text-xs text-zinc-500">Transactions</p><p className="text-lg font-bold text-zinc-200">{sales.length}</p></div>
            <div><p className="text-xs text-zinc-500">Gross Profit</p><p className="text-lg font-bold text-emerald-400">{formatUGX(todayProfit)}</p></div>
            <div><p className="text-xs text-zinc-500">Avg. Sale</p><p className="text-lg font-bold text-zinc-200">{sales.length > 0 ? formatUGX(Math.round(todayTotal / sales.length)) : "—"}</p></div>
          </div>
        </div>
      </div>
      <div className="flex-1 overflow-y-auto px-4 pb-4">
        {sales.length === 0 ? (
          <div className="text-center py-16"><span className="text-5xl mb-4 block">🧾</span><p className="text-zinc-500">No sales yet today</p><p className="text-zinc-600 text-sm mt-1">Complete a sale to see it here</p></div>
        ) : (
          <div className="space-y-2">
            {[...sales].reverse().map((sale) => (
              <div key={sale.id} className="bg-zinc-800/40 rounded-xl border border-zinc-700/30 p-4">
                <div className="flex items-center justify-between mb-2">
                  <div className="flex items-center gap-2">
                    <span className={`px-2 py-0.5 rounded-md text-xs font-medium ${sale.method === "cash" ? "bg-emerald-500/15 text-emerald-400" : sale.method === "momo" ? "bg-blue-500/15 text-blue-400" : "bg-orange-500/15 text-orange-400"}`}>
                      {sale.method === "cash" ? "💵 Cash" : sale.method === "momo" ? "📱 MoMo" : "📝 Credit"}
                    </span>
                    <span className="text-xs text-zinc-600">#{sale.id}</span>
                  </div>
                  <span className="text-xs text-zinc-500">{sale.time}</span>
                </div>
                <div className="space-y-1">
                  {sale.items.map((item, j) => (
                    <div key={j} className="flex justify-between text-sm">
                      <span className="text-zinc-400">{item.image} {item.name} {item.type !== "weight" ? `× ${item.qty}` : ""}</span>
                      <span className="text-zinc-300 font-medium">{formatUGX(item.lineTotal)}</span>
                    </div>
                  ))}
                </div>
                <div className="flex justify-between mt-2 pt-2 border-t border-zinc-700/30">
                  <span className="text-sm text-zinc-500">Total</span>
                  <span className="text-amber-400 font-bold">{formatUGX(sale.total)}</span>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function LoginScreen({ onLogin }) {
  const [pin, setPin] = useState("");
  const [shake, setShake] = useState(false);
  const [user, setUser] = useState("Cashier");

  const handleKey = (k) => {
    if (k === "DEL") return setPin(p => p.slice(0, -1));
    if (k === "OK") {
      if (pin.length >= 4) onLogin({ name: user, role: user.toLowerCase() });
      else { setShake(true); setTimeout(() => setShake(false), 500); }
      return;
    }
    if (pin.length < 6) setPin(p => p + k);
  };

  return (
    <div className="min-h-screen bg-zinc-950 flex flex-col items-center justify-center p-6" style={{ background: "radial-gradient(ellipse at 50% 0%, rgba(245,158,11,0.08) 0%, rgba(9,9,11,1) 60%)" }}>
      <div className="w-full max-w-sm">
        <div className="text-center mb-10">
          <div className="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-gradient-to-br from-amber-500 to-orange-600 mb-4 shadow-lg shadow-amber-500/20"><span className="text-4xl">🏪</span></div>
          <h1 className="text-2xl font-bold text-zinc-100 tracking-tight" style={{ fontFamily: "'DM Sans', sans-serif" }}>Oola RetailFlow</h1>
          <p className="text-zinc-500 text-sm mt-1">Point of Sale System</p>
        </div>
        <div className="flex gap-2 mb-6 bg-zinc-900/80 rounded-xl p-1 border border-zinc-800/50">
          {["Admin", "Manager", "Cashier"].map(u => (
            <button key={u} onClick={() => setUser(u)} className={`flex-1 py-2 rounded-lg text-sm font-medium transition-all ${user === u ? "bg-amber-500/20 text-amber-400 border border-amber-500/30" : "text-zinc-500 hover:text-zinc-300"}`}>{u}</button>
          ))}
        </div>
        <div className={`flex justify-center gap-3 mb-8 ${shake ? "animate-bounce" : ""}`}>
          {[0,1,2,3].map(i => (
            <div key={i} className={`w-12 h-12 rounded-xl border-2 flex items-center justify-center transition-all ${i < pin.length ? "border-amber-500 bg-amber-500/10" : "border-zinc-700 bg-zinc-900/50"}`}>
              {i < pin.length && <div className="w-3 h-3 rounded-full bg-amber-400"/>}
            </div>
          ))}
        </div>
        <div className="grid grid-cols-3 gap-3">
          {["1","2","3","4","5","6","7","8","9","DEL","0","OK"].map(k => (
            <button key={k} onClick={() => handleKey(k)} className={`h-14 rounded-xl font-semibold text-lg transition-all active:scale-95 ${k === "OK" ? "bg-amber-500 text-zinc-900 hover:bg-amber-400 shadow-lg shadow-amber-500/20" : k === "DEL" ? "bg-zinc-800 text-zinc-400 hover:bg-zinc-700" : "bg-zinc-900 text-zinc-200 hover:bg-zinc-800 border border-zinc-800"}`}>
              {k === "DEL" ? "⌫" : k}
            </button>
          ))}
        </div>
        <p className="text-center text-zinc-600 text-xs mt-6">Enter any 4-digit PIN to continue</p>
      </div>
    </div>
  );
}

function SettingsPanel({ online, source, pendingCount, onSync, onClose }) {
  const [apiKey, setApiKey] = React.useState(localStorage.getItem("anthropic_key") || "");
  const [saved, setSaved] = React.useState(false);

  const handleSaveKey = () => {
    const trimmed = apiKey.trim();
    if (trimmed) {
      localStorage.setItem("anthropic_key", trimmed);
    } else {
      localStorage.removeItem("anthropic_key");
    }
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  const handleClearKey = () => {
    localStorage.removeItem("anthropic_key");
    setApiKey("");
    setSaved(false);
  };

  const storedKey = localStorage.getItem("anthropic_key");

  return (
    <div className="absolute right-4 top-14 z-40 w-80 bg-zinc-900 border border-zinc-700 rounded-2xl shadow-2xl p-4 space-y-4">
      <div className="flex items-center justify-between">
        <h3 className="text-sm font-bold text-zinc-200">⚙️ Settings</h3>
        <button onClick={onClose} className="text-zinc-500 hover:text-zinc-300 text-lg leading-none">✕</button>
      </div>

      {/* AI Snap Key */}
      <div className="space-y-2">
        <div className="flex items-center justify-between">
          <label className="text-xs font-semibold text-zinc-300">🤖 AI Snap API Key</label>
          {storedKey && <span className="text-xs text-emerald-400 font-medium">✓ Saved</span>}
        </div>
        <input
          type="password"
          value={apiKey}
          onChange={e => { setApiKey(e.target.value); setSaved(false); }}
          placeholder="Paste your Anthropic key here (sk-ant-...)"
          className="w-full bg-zinc-800 border border-zinc-600 rounded-xl px-3 py-2.5 text-xs text-zinc-200 placeholder-zinc-600 focus:outline-none focus:border-violet-500/60 focus:ring-1 focus:ring-violet-500/20"
        />
        <p className="text-xs text-zinc-600">Get your key at console.anthropic.com → API Keys</p>
        <div className="flex gap-2">
          <button onClick={handleSaveKey}
            className={`flex-1 py-2 rounded-xl text-xs font-semibold transition-all ${saved ? "bg-emerald-500/20 text-emerald-400" : "bg-violet-500/20 text-violet-400 hover:bg-violet-500/30"}`}>
            {saved ? "✓ Saved!" : "Save Key"}
          </button>
          {storedKey && (
            <button onClick={handleClearKey}
              className="px-3 py-2 rounded-xl text-xs font-medium bg-zinc-800 text-zinc-500 hover:text-red-400 hover:bg-red-500/10 transition-all">
              Clear
            </button>
          )}
        </div>
      </div>

      {/* Divider */}
      <div className="border-t border-zinc-800" />

      {/* Connection info */}
      <div className="space-y-2">
        <p className="text-xs font-semibold text-zinc-400">Connection</p>
        <div className="flex items-center justify-between">
          <span className="text-xs text-zinc-500">Status</span>
          <span className={`text-xs font-medium ${online ? "text-emerald-400" : "text-red-400"}`}>{online ? "Online" : "Offline"}</span>
        </div>
        <div className="flex items-center justify-between">
          <span className="text-xs text-zinc-500">Data</span>
          <span className="text-xs font-medium text-zinc-300">{source === "api" ? "Live (Google Sheets)" : source === "cache" ? "Cached" : "Local only"}</span>
        </div>
        <div className="flex items-center justify-between">
          <span className="text-xs text-zinc-500">Pending Sales</span>
          <span className={`text-xs font-medium ${pendingCount > 0 ? "text-amber-400" : "text-emerald-400"}`}>{pendingCount > 0 ? `${pendingCount} awaiting sync` : "All synced ✓"}</span>
        </div>
      </div>

      <button onClick={onSync}
        className="w-full py-2.5 rounded-xl bg-amber-500/20 text-amber-400 text-xs font-semibold hover:bg-amber-500/30 transition-all">
        ↻ Sync Now
      </button>
    </div>
  );
}

function RetailFlowPOS() {
  const [loggedIn, setLoggedIn] = useState(false);
  const [user, setUser] = useState(null);
  const [activeTab, setActiveTab] = useState("pos");
  const { products, setProducts, loading, source, refreshProducts } = useProducts();
  const [cart, setCart] = useState([]);
  const [sales, setSales] = useState([]);
  const [showPayment, setShowPayment] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const { online, pendingCount, lastSync, syncing, setPendingCount } = useOnlineStatus();

  // FIX: inject Google Font into <head> properly instead of rendering a <link> inside JSX body
  useEffect(() => {
    const id = "dm-sans-font";
    if (!document.getElementById(id)) {
      const link = document.createElement("link");
      link.id = id;
      link.rel = "stylesheet";
      link.href = "https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap";
      document.head.appendChild(link);
    }
  }, []);

  const cartTotal = cart.reduce((sum, c) => sum + c.lineTotal, 0);
  const cartCount = cart.reduce((sum, c) => sum + c.qty, 0);

  // Load sales from cache on startup
  useEffect(() => {
    const loadSales = async () => {
      try {
        const cached = await dbGetAll("syncedSales");
        if (cached.length > 0) setSales(cached);
      } catch (e) { /* ignore */ }

      // Also try from API
      if (api.isConfigured()) {
        const today = new Date().toISOString().split("T")[0];
        const result = await api.get("getSales", { date: today, limit: "200" });
        if (result && result.success) {
          setSales(result.sales);
          await dbClear("syncedSales");
          await dbPut("syncedSales", result.sales);
        }
      }
    };
    if (loggedIn) loadSales();
  }, [loggedIn]);

  const handleCompleteSale = async (paymentInfo) => {
    const offlineId = "OFF_" + Date.now() + "_" + Math.random().toString(36).substr(2, 6);
    const now = new Date();
    const saleData = {
      offlineId,
      dateTime: now.toISOString(),
      items: cart.map(c => ({ ...c })),
      total: cartTotal,
      paymentMethod: paymentInfo.method,
      amountPaid: paymentInfo.amountPaid,
      change: paymentInfo.change,
      cashierId: (user && user.id ? user.id : ""),
      cashierName: (user && user.name ? user.name : ""),
    };

    // Add to local sales list for display
    const localSale = {
      id: offlineId,
      ...saleData,
      method: paymentInfo.method,
      time: now.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" }),
      date: now.toLocaleDateString(),
      synced: false,
    };
    setSales(prev => [...prev, localSale]);

    // Save to IndexedDB pending queue
    try {
      await dbPut("pendingSales", saleData);
      setPendingCount(prev => prev + 1);
    } catch (e) { /* continue */ }

    // Try immediate sync if online
    if (online && api.isConfigured()) {
      try {
        const result = await api.post("recordSale", saleData);
        if (result && result.success) {
          await dbDelete("pendingSales", offlineId);
          setPendingCount(prev => Math.max(0, prev - 1));
          // Update the sale in our list to show as synced
          setSales(prev => prev.map(s => s.id === offlineId ? { ...s, id: result.saleId, synced: true } : s));
        }
      } catch (e) { /* Will sync later */ }
    }

    setCart([]);
    setShowPayment(false);
  };

  // Manual sync trigger
  const handleManualSync = async () => {
    if (!online || !api.isConfigured()) return;
    const result = await syncPendingSales();
    if (result.synced > 0) {
      const remaining = await dbGetAll("pendingSales");
      setPendingCount(remaining.length);
    }
    await refreshProducts();
  };

  if (!loggedIn) return <LoginScreen onLogin={(u) => { setUser(u); setLoggedIn(true); }} />;

  const tabs = [
    { id: "pos", label: "Sell", icon: <svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="12" y1="7" x2="12" y2="17"/></svg> },
    { id: "inventory", label: "Stock", icon: <svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg> },
    { id: "history", label: "Sales", icon: <svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg> },
  ];

  return (
    <div className="h-screen flex flex-col bg-zinc-950 text-zinc-100 overflow-hidden" style={{ background: "linear-gradient(180deg, rgba(24,24,27,1) 0%, rgba(9,9,11,1) 100%)" }}>

      {/* Header with Sync Status */}
      <header className="flex items-center justify-between px-4 py-3 border-b border-zinc-800/50 bg-zinc-950/80 backdrop-blur-sm">
        <div className="flex items-center gap-3">
          <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-amber-500 to-orange-600 flex items-center justify-center shadow-lg shadow-amber-500/10"><span className="text-lg">🏪</span></div>
          <div>
            <h1 className="text-sm font-bold text-zinc-100 leading-none" style={{ fontFamily: "'DM Sans', sans-serif" }}>Oola RetailFlow</h1>
            <p className="text-xs text-zinc-500 leading-none mt-0.5">{(user && user.name ? user.name : "User")} • {new Date().toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" })}</p>
          </div>
        </div>

        <div className="flex items-center gap-2">
          {/* Connection & Sync Status */}
          <button onClick={handleManualSync} className="flex items-center gap-1.5 px-2 py-1 rounded-lg hover:bg-zinc-800 transition-all" title={online ? "Online" : "Offline"}>
            {/* Online/Offline dot */}
            <span className={`w-2 h-2 rounded-full ${online ? "bg-emerald-400 shadow shadow-emerald-400/50" : "bg-red-400 shadow shadow-red-400/50"} ${syncing ? "animate-pulse" : ""}`} />

            {/* Pending sync count */}
            {pendingCount > 0 && (
              <span className="flex items-center gap-0.5 text-xs text-amber-400 font-medium">
                <svg width="12" height="12" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" className={syncing ? "animate-spin" : ""}><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>
                {pendingCount}
              </span>
            )}

            {/* Data source badge */}
            <span className={`text-xs px-1.5 py-0.5 rounded font-medium ${
              source === "api" ? "bg-emerald-500/15 text-emerald-400" :
              source === "cache" ? "bg-blue-500/15 text-blue-400" :
              "bg-zinc-700 text-zinc-400"
            }`}>
              {source === "api" ? "Live" : source === "cache" ? "Cached" : "Demo"}
            </span>
          </button>

          {/* Settings */}
          <button onClick={() => setShowSettings(!showSettings)} className="text-zinc-500 hover:text-zinc-300 p-1 rounded-lg hover:bg-zinc-800 transition-all">
            <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          </button>

          <button onClick={() => { setLoggedIn(false); setUser(null); setCart([]); }} className="text-xs text-zinc-500 hover:text-red-400 transition-colors px-2 py-1.5 rounded-lg hover:bg-red-500/10">Out</button>
        </div>
      </header>

      {/* Offline Banner */}
      {!online && (
        <div className="bg-amber-500/10 border-b border-amber-500/20 px-4 py-2 flex items-center gap-2">
          <span className="text-amber-400 text-sm">⚡</span>
          <p className="text-xs text-amber-300 flex-1">You're offline — sales are saved locally and will sync when internet returns</p>
          {pendingCount > 0 && <span className="text-xs font-bold text-amber-400">{pendingCount} pending</span>}
        </div>
      )}

      {/* Settings Dropdown */}
      {showSettings && (
        <SettingsPanel
          online={online}
          source={source}
          pendingCount={pendingCount}
          onSync={() => { handleManualSync(); setShowSettings(false); }}
          onClose={() => setShowSettings(false)}
        />
      )}



      {/* Loading indicator */}
      {loading && (
        <div className="flex items-center justify-center py-8">
          <div className="w-8 h-8 border-3 border-amber-500 border-t-transparent rounded-full animate-spin" />
        </div>
      )}

      {/* Content */}
      <main className="flex-1 overflow-hidden">
        {activeTab === "pos" && <POSScreen products={products} cart={cart} setCart={setCart} onComplete={() => setShowPayment(true)} />}
        {activeTab === "inventory" && <InventoryScreen products={products} setProducts={setProducts} />}
        {activeTab === "history" && <HistoryScreen sales={sales} />}
      </main>

      <nav className="flex border-t border-zinc-800/50 bg-zinc-950/95 backdrop-blur-sm px-2 pb-1 pt-1">
        {tabs.map(tab => (
          <button key={tab.id} onClick={() => setActiveTab(tab.id)}
            className={`flex-1 flex flex-col items-center py-2 gap-0.5 transition-all relative ${activeTab === tab.id ? "text-amber-400" : "text-zinc-600 hover:text-zinc-400"}`}>
            {activeTab === tab.id && <div className="absolute -top-1 w-8 h-0.5 rounded-full bg-amber-400" />}
            {tab.icon}
            <span className="text-xs font-medium">{tab.label}</span>
            {tab.id === "pos" && cartCount > 0 && <span className="absolute top-1 right-1/4 bg-amber-500 text-zinc-900 text-xs font-bold rounded-full w-4 h-4 flex items-center justify-center">{cartCount}</span>}
          </button>
        ))}
      </nav>

      {showPayment && <PaymentModal cart={cart} total={cartTotal} onClose={() => setShowPayment(false)} onConfirm={handleCompleteSale} />}
    </div>
  );
}

// Render the app
document.getElementById('ld').style.display = 'none';
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(RetailFlowPOS));
    </script>
    <script>
        if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){})}
