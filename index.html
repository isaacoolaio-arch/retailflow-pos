// RetailFlow POS — Configuration

// Set this to your deployed Apps Script Web App URL
// Leave empty to use demo/mock data mode
const API_URL = "https://script.google.com/macros/s/AKfycbwZ3aTUSC89PVPmE4J47oaq8lXeJqdyfBQrvU4xC4Eko9Tn9SZ7dKiCauMotsNpENur_g/exec";
const DEVICE_ID = "device_" + Math.random().toString(36).substr(2, 8);

// ─── IndexedDB Offline Cache ──────────────────────────────────

const DB_NAME = "OolaRetailFlowDB";
const DB_VERSION = 1;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains("products")) db.createObjectStore("products", { keyPath: "id" });
      if (!db.objectStoreNames.contains("pendingSales")) db.createObjectStore("pendingSales", { keyPath: "offlineId" });
      if (!db.objectStoreNames.contains("syncedSales")) db.createObjectStore("syncedSales", { keyPath: "id" });
      if (!db.objectStoreNames.contains("meta")) db.createObjectStore("meta", { keyPath: "key" });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbPut(storeName, data) {
  try {
    const db = await openDB();
    const tx = db.transaction(storeName, "readwrite");
    const store = tx.objectStore(storeName);
    if (Array.isArray(data)) { data.forEach(item => store.put(item)); }
    else { store.put(data); }
    return new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
  } catch (e) { console.warn("DB put failed:", e); }
}

async function dbGetAll(storeName) {
  try {
    const db = await openDB();
    const tx = db.transaction(storeName, "readonly");
    const store = tx.objectStore(storeName);
    return new Promise((res, rej) => {
      const req = store.getAll();
      req.onsuccess = () => res(req.result || []);
      req.onerror = () => rej(req.error);
    });
  } catch (e) { console.warn("DB getAll failed:", e); return []; }
}

async function dbDelete(storeName, key) {
  try {
    const db = await openDB();
    const tx = db.transaction(storeName, "readwrite");
    tx.objectStore(storeName).delete(key);
    return new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
  } catch (e) { console.warn("DB delete failed:", e); }
}

async function dbClear(storeName) {
  try {
    const db = await openDB();
    const tx = db.transaction(storeName, "readwrite");
    tx.objectStore(storeName).clear();
    return new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
  } catch (e) { console.warn("DB clear failed:", e); }
}

// ─── API Service ──────────────────────────────────────────────

// Wraps a fetch promise with a timeout
function fetchWithTimeout(promise, ms) {
  const timeout = new Promise((_, reject) =>
    setTimeout(() => reject(new Error("timeout")), ms)
  );
  return Promise.race([promise, timeout]);
}

const api = {
  isConfigured: () => !!API_URL,

  async get(action, params = {}) {
    if (!API_URL) return null;
    const url = new URL(API_URL);
    url.searchParams.set("action", action);
    Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));
    try {
      const res = await fetchWithTimeout(
        fetch(url.toString(), { redirect: "follow" }),
        8000  // 8 second timeout
      );
      return await res.json();
    } catch (e) {
      console.warn("API GET failed:", e.message);
      return null;
    }
  },

  // ── CRITICAL: Content-Type must be "text/plain" for Apps Script ──
  // Apps Script 302-redirects cross-origin requests. Browsers convert
  // POST→GET when following a 302, dropping the body entirely, so
  // doPost() never fires. Using text/plain avoids the CORS preflight
  // and sends the POST body directly — doPost() receives it correctly.
  async post(action, data = {}) {
    if (!API_URL) return null;
    try {
      const body = JSON.stringify({ action, ...data, deviceId: DEVICE_ID });
      const res = await fetchWithTimeout(
        fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body,
          redirect: "follow"
        }),
        35000  // 35 second timeout — Apps Script cold start can take 20–30s
      );
      const text = await res.text();
      try { return JSON.parse(text); }
      catch (e) { console.warn("API POST non-JSON response:", text); return null; }
    } catch (e) {
      console.warn("API POST failed:", e.message);
      return null;
    }
  }
};

// ─── Sync Engine ──────────────────────────────────────────────

async function syncPendingSales() {
  if (!api.isConfigured()) return { synced: 0, pending: 0 };

  const pending = await dbGetAll("pendingSales");
  if (pending.length === 0) return { synced: 0, pending: 0 };

  try {
    const result = await api.post("syncSales", { sales: pending });
    if (result && result.success) {
      // Remove successfully synced sales from pending
      for (const r of (result.results || [])) {
        if (r.success && r.offlineId) {
          await dbDelete("pendingSales", r.offlineId);
        }
      }
      return { synced: result.synced || 0, pending: result.failed || 0 };
    }
  } catch (e) {
    console.warn("Sync failed:", e);
  }
  return { synced: 0, pending: pending.length };
}

// ─── Online Status Hook ───────────────────────────────────────

function useOnlineStatus() {
  const [online, setOnline] = useState(navigator.onLine);
  const [pendingCount, setPendingCount] = useState(0);
  const [lastSync, setLastSync] = useState(null);
  const [syncing, setSyncing] = useState(false);

  useEffect(() => {
    const goOnline = () => setOnline(true);
    const goOffline = () => setOnline(false);
    window.addEventListener("online", goOnline);
    window.addEventListener("offline", goOffline);
    return () => {
      window.removeEventListener("online", goOnline);
      window.removeEventListener("offline", goOffline);
    };
  }, []);

  // Check pending sales count periodically
  useEffect(() => {
    const check = async () => {
      try {
        const pending = await dbGetAll("pendingSales");
        setPendingCount(pending.length);
      } catch (e) { /* ignore */ }
    };
    check();
    const interval = setInterval(check, 5000);
    return () => clearInterval(interval);
  }, []);

  // Auto-sync when coming back online
  useEffect(() => {
    if (online && pendingCount > 0 && !syncing) {
      const doSync = async () => {
        setSyncing(true);
        const result = await syncPendingSales();
        if (result.synced > 0) {
          setLastSync(new Date());
          const remaining = await dbGetAll("pendingSales");
          setPendingCount(remaining.length);
        }
        setSyncing(false);
      };
      doSync();
    }
  }, [online, pendingCount]);

  return { online, pendingCount, lastSync, syncing, setPendingCount };
}

// ─── Data Loading Hook ────────────────────────────────────────

function useProducts() {
  const [products, setProducts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [source, setSource] = useState("loading");

  // Merge API products with any locally-added ones not yet in the API
  const mergeWithLocal = async (apiProducts) => {
    try {
      const cached = await dbGetAll("products");
      const apiIds = new Set(apiProducts.map(p => p.id));
      // Keep cached products not in API, but never include demo products
      const localOnly = cached.filter(p => !apiIds.has(p.id) && !DEMO_IDS.has(p.id));
      return [...apiProducts, ...localOnly];
    } catch (e) {
      return apiProducts;
    }
  };

  useEffect(() => {
    const load = async () => {
      setLoading(true);

      // Remove any demo/mock data from IndexedDB before loading
      await cleanupDemoData();
      try {
        const cached = await dbGetAll("products");
        if (cached.length > 0) {
          setProducts(cached);
          setSource("cache");
          setLoading(false);
        }
      } catch (e) { /* continue */ }

      // 2. Background refresh from API — MERGE, never blindly overwrite
      if (api.isConfigured()) {
        try {
          const result = await api.get("getProducts");
          if (result && result.success && result.products) {
            const merged = await mergeWithLocal(result.products);
            setProducts(merged);
            setSource("api");
            // Write merged list back to IndexedDB
            await dbClear("products");
            await dbPut("products", merged);
            await dbPut("meta", { key: "lastProductSync", value: new Date().toISOString() });
            setLoading(false);
            return;
          }
        } catch (e) { /* network error — keep showing cache */ }
      }

      // 3. Fallback to demo data ONLY if API is NOT configured (offline/unconfigured)
      // When API is configured but returns empty, show empty — not fake demo data
      if (!api.isConfigured()) {
        try {
          const cached = await dbGetAll("products");
          if (cached.length === 0) {
            setProducts(MOCK_PRODUCTS);
            setSource("demo");
          }
        } catch(e) {
          setProducts(MOCK_PRODUCTS);
          setSource("demo");
        }
      }
      setLoading(false);
    };
    load();
  }, []);

  const refreshProducts = async () => {
    if (!api.isConfigured()) return;
    try {
      const result = await api.get("getProducts");
      if (result && result.success && result.products) {
        const merged = await mergeWithLocal(result.products);
        setProducts(merged);
        setSource("api");
        await dbClear("products");
        await dbPut("products", merged);
      }
    } catch (e) { /* silent */ }
  };

  return { products, setProducts, loading, source, refreshProducts };
}

// ─── Demo data cleanup ────────────────────────────────────────
// When API is configured, purge any demo/mock products and stale
// sales from IndexedDB so they never appear in the real app.
const DEMO_IDS = new Set([
  "P001","P002","P003","P004","P005","P006","P007","P008",
  "W001","W002","W003","W004","W005","W006","W007","W008",
  "PC01","PC02","PC03","PC04",
  "V001","V002","V003"
]);

async function cleanupDemoData() {
  if (!api.isConfigured()) return;
  try {
    // Remove any demo products from the products cache
    const cached = await dbGetAll("products");
    const hasDemoProducts = cached.some(p => DEMO_IDS.has(p.id));
    if (hasDemoProducts) {
      const real = cached.filter(p => !DEMO_IDS.has(p.id));
      await dbClear("products");
      if (real.length > 0) await dbPut("products", real);
      console.log("[cleanup] Removed demo products from IndexedDB cache");
    }
    // Remove any demo/fake sales (those with OFF_ IDs that were never real)
    // We don't touch pendingSales — those are legitimate offline sales
  } catch (e) { /* silent */ }
}

// ─── Scan feedback: beep + vibration ─────────────────────────
function playBeep(type) {
  // type: "success" | "error" | "snap"
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);

    if (type === "error") {
      osc.frequency.setValueAtTime(220, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(110, ctx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.4, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.35);
    } else if (type === "snap") {
      // Double-beep for AI camera snap
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.setValueAtTime(1200, ctx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.setValueAtTime(0.3, ctx.currentTime + 0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.25);
    } else {
      // success — single clean high beep
      osc.frequency.setValueAtTime(1400, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1600, ctx.currentTime + 0.08);
      gain.gain.setValueAtTime(0.4, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.12);
    }
    setTimeout(function(){ try{ ctx.close(); }catch(e){} }, 500);
  } catch(e) { /* AudioContext not available */ }

  // Vibration — works on Android Chrome
  try {
    if (navigator.vibrate) {
      if (type === "error")   navigator.vibrate([100, 50, 100]);
      else if (type === "snap") navigator.vibrate([30, 40, 60]);
      else                    navigator.vibrate(60);
    }
  } catch(e) {}
}

function CameraScanModal({ products, onProductFound, onClose }) {
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const [stream, setStream] = useState(null);
  const [scanning, setScanning] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const [capturedImage, setCapturedImage] = useState(null);
  const [cameraReady, setCameraReady] = useState(false);

  // Build product catalog for AI context
  const productCatalog = products.map(p => {
    const pricePart = p.type === "weight" ? `${p.pricePerKg}/kg` : p.type === "piece" ? `${p.pricePerPiece}/piece` : p.type === "variant" ? `variants` : `${p.price}`;
    return `${p.id}: ${p.name} (${p.type}, ${p.category}, ${pricePart})`;
  }).join("\n");

  useEffect(() => {
    let mounted = true;
    const startCamera = async () => {
      try {
        const mediaStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        if (mounted && videoRef.current) {
          videoRef.current.srcObject = mediaStream;
          setStream(mediaStream);
          setCameraReady(true);
        }
      } catch (err) {
        if (mounted) setError("Camera access denied. Please allow camera permission.");
      }
    };
    startCamera();
    return () => {
      mounted = false;
      if (stream) stream.getTracks().forEach(t => t.stop());
    };
  }, []);

  const stopCamera = () => {
    if (stream) stream.getTracks().forEach(t => t.stop());
  };

  const captureAndIdentify = async () => {
    if (!videoRef.current || !canvasRef.current) return;

    const video = videoRef.current;
    const canvas = canvasRef.current;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    const imageData = canvas.toDataURL("image/jpeg", 0.8);
    setCapturedImage(imageData);
    setScanning(true);
    setResult(null);
    setError(null);

    try {
      const base64 = imageData.split(",")[1];

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: [
              {
                type: "image",
                source: { type: "base64", media_type: "image/jpeg", data: base64 }
              },
              {
                type: "text",
                text: `You are a product identification system for a retail shop POS in Uganda. Look at this image and identify what product/food item it is.

Here are the products available in our shop inventory:
${productCatalog}

INSTRUCTIONS:
1. Look at the image carefully - it may show items in a clear polythene bag (cavera), on a scale, loose, or packaged.
2. Identify what the product is (sugar, beans, rice, irish potatoes, groundnuts, onions, tomatoes, maize flour, eggs, etc.)
3. Match it to the closest product ID from the inventory list above.
4. If you can estimate the weight or quantity from the image, include that.

Respond ONLY with this exact JSON format, no other text:
{"product_id": "W001", "product_name": "Sugar (Loose)", "confidence": "high", "estimated_weight_kg": 1.0, "estimated_pieces": null, "notes": "White granulated sugar in clear cavera bag, approximately 1kg"}

If confidence is low or you cannot identify: {"product_id": null, "product_name": null, "confidence": "low", "notes": "reason"}`
              }
            ]
          }]
        })
      });

      const data = await response.json();
      const text = (data.content ? data.content.map(c => c.text || "").join("") : "");
      const clean = text.replace(/```json|```/g, "").trim();

      try {
        const parsed = JSON.parse(clean);
        setResult(parsed);

        if (parsed.product_id && parsed.confidence !== "low") {
          const matchedProduct = products.find(p => p.id === parsed.product_id);
          if (matchedProduct) {
            playBeep("snap");
            setResult({ ...parsed, matched: matchedProduct });
          } else {
            playBeep("error");
          }
        } else {
          playBeep("error");
        }
      } catch {
        playBeep("error");
        setError("Could not parse AI response. Try again.");
      }
    } catch (err) {
      playBeep("error");
      setError("Failed to connect to AI. Check your internet connection.");
    }

    setScanning(false);
  };

  const handleConfirmProduct = () => {
    if ((result && result.matched)) {
      stopCamera();
      onProductFound(result.matched, result.estimated_weight_kg, result.estimated_pieces);
    }
  };

  const handleRetake = () => {
    setCapturedImage(null);
    setResult(null);
    setError(null);
  };

  const handleClose = () => {
    stopCamera();
    onClose();
  };

  return (
    <div className="fixed inset-0 bg-black z-50 flex flex-col">
      {/* Header */}
      <div className="flex items-center justify-between p-4 bg-black/80 backdrop-blur-sm z-10">
        <div className="flex items-center gap-2">
          <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center">
            <span className="text-sm">🤖</span>
          </div>
          <div>
            <h3 className="text-sm font-bold text-white">Smart Scanner</h3>
            <p className="text-xs text-zinc-400">AI Product Detection</p>
          </div>
        </div>
        <button onClick={handleClose} className="w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center text-zinc-300 hover:bg-zinc-700">
          <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>

      {/* Camera View */}
      <div className="flex-1 relative overflow-hidden bg-black">
        {!capturedImage ? (
          <>
            <video ref={videoRef} autoPlay playsInline muted className="w-full h-full object-cover" />
            {/* Scanning overlay frame */}
            <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
              <div className="w-64 h-64 relative">
                <div className="absolute top-0 left-0 w-10 h-10 border-t-4 border-l-4 border-cyan-400 rounded-tl-2xl" />
                <div className="absolute top-0 right-0 w-10 h-10 border-t-4 border-r-4 border-cyan-400 rounded-tr-2xl" />
                <div className="absolute bottom-0 left-0 w-10 h-10 border-b-4 border-l-4 border-cyan-400 rounded-bl-2xl" />
                <div className="absolute bottom-0 right-0 w-10 h-10 border-b-4 border-r-4 border-cyan-400 rounded-br-2xl" />
                {cameraReady && (
                  <div className="absolute inset-0 flex items-center justify-center">
                    <p className="text-cyan-300 text-sm font-medium bg-black/50 px-3 py-1 rounded-full">
                      Point at product
                    </p>
                  </div>
                )}
              </div>
            </div>
          </>
        ) : (
          <img src={capturedImage} className="w-full h-full object-cover" alt="Captured" />
        )}

        {/* Scanning animation overlay */}
        {scanning && (
          <div className="absolute inset-0 bg-black/50 flex flex-col items-center justify-center">
            <div className="w-16 h-16 rounded-full border-4 border-cyan-400 border-t-transparent animate-spin mb-4" />
            <p className="text-cyan-300 font-semibold text-lg">Identifying product...</p>
            <p className="text-zinc-400 text-sm mt-1">AI is analyzing the image</p>
          </div>
        )}
      </div>

      <canvas ref={canvasRef} className="hidden" />

      {/* Results / Actions Panel */}
      <div className="bg-zinc-900 border-t border-zinc-800 p-4 space-y-3">
        {error && (
          <div className="bg-red-500/10 border border-red-500/30 rounded-xl p-3 flex items-center gap-2">
            <span className="text-red-400">⚠️</span>
            <p className="text-sm text-red-300 flex-1">{error}</p>
            <button onClick={handleRetake} className="text-xs text-red-400 underline">Retry</button>
          </div>
        )}

        {result && !error && (
          <div className={`rounded-xl p-4 border ${
            result.confidence === "high" ? "bg-emerald-500/10 border-emerald-500/30" :
            result.confidence === "medium" ? "bg-amber-500/10 border-amber-500/30" :
            "bg-red-500/10 border-red-500/30"
          }`}>
            {result.matched ? (
              <div className="flex items-center gap-3">
                <span className="text-3xl">{result.matched.image}</span>
                <div className="flex-1">
                  <div className="flex items-center gap-2">
                    <p className="text-lg font-bold text-zinc-100">{result.matched.name}</p>
                    <span className={`px-2 py-0.5 rounded-full text-xs font-semibold ${
                      result.confidence === "high" ? "bg-emerald-500/20 text-emerald-400" : "bg-amber-500/20 text-amber-400"
                    }`}>{result.confidence === "high" ? "✓ Sure" : "~ Maybe"}</span>
                  </div>
                  <p className="text-sm text-zinc-400 mt-0.5">{result.notes}</p>
                  {result.estimated_weight_kg && (
                    <p className="text-sm text-cyan-400 mt-1 font-medium">Est. weight: ~{result.estimated_weight_kg}kg</p>
                  )}
                  {result.estimated_pieces && (
                    <p className="text-sm text-cyan-400 mt-1 font-medium">Est. count: ~{result.estimated_pieces} pieces</p>
                  )}
                </div>
              </div>
            ) : (
              <div className="text-center">
                <p className="text-zinc-300 font-medium">Could not identify product</p>
                <p className="text-sm text-zinc-500 mt-1">{result.notes || "Try taking a clearer photo"}</p>
              </div>
            )}
          </div>
        )}

        {/* Action Buttons */}
        <div className="flex gap-3">
          {!capturedImage ? (
            <button onClick={captureAndIdentify} disabled={!cameraReady || scanning}
              className={`flex-1 py-4 rounded-2xl font-bold text-lg transition-all active:scale-95 flex items-center justify-center gap-2 ${
                cameraReady && !scanning
                  ? "bg-gradient-to-r from-cyan-500 to-blue-500 text-white shadow-lg shadow-cyan-500/30"
                  : "bg-zinc-800 text-zinc-500 cursor-not-allowed"
              }`}>
              <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/>
              </svg>
              {scanning ? "Scanning..." : "Snap & Identify"}
            </button>
          ) : (
            <>
              <button onClick={handleRetake}
                className="flex-1 py-4 rounded-2xl bg-zinc-800 text-zinc-300 font-bold text-lg hover:bg-zinc-700 active:scale-95 transition-all">
                ↻ Retake
              </button>
              {(result && result.matched) && (
                <button onClick={handleConfirmProduct}
                  className="flex-1 py-4 rounded-2xl bg-gradient-to-r from-emerald-500 to-teal-500 text-white font-bold text-lg shadow-lg shadow-emerald-500/30 active:scale-95 transition-all">
                  ✓ Add {result.matched.name}
                </button>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}


function BarcodeScannerModal({ onScan, onClose }) {
  const scannerRef = useRef(null);
  const [scanning, setScanning] = useState(false);
  const [error, setError] = useState(null);
  const html5QrcodeRef = useRef(null);

  useEffect(function() {
    var scanner = null;
    try {
      scanner = new Html5Qrcode("barcode-reader");
      html5QrcodeRef.current = scanner;
      scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 280, height: 150 }, aspectRatio: 1.777 },
        function(decodedText) {
          playBeep("success");
          scanner.stop().then(function() {
            onScan(decodedText);
          }).catch(function() { onScan(decodedText); });
        },
        function(err) { /* ignore scan errors */ }
      ).then(function() {
        setScanning(true);
      }).catch(function(err) {
        setError("Camera access denied or not available");
      });
    } catch(e) {
      setError("Barcode scanner not supported");
    }
    return function() {
      if (html5QrcodeRef.current) {
        try { html5QrcodeRef.current.stop(); } catch(e) {}
      }
    };
  }, []);

  return (
    <div className="fixed inset-0 bg-black/90 z-50 flex flex-col">
      <div className="flex items-center justify-between p-4 bg-black">
        <div>
          <h3 className="text-sm font-bold text-white">Barcode Scanner</h3>
          <p className="text-xs text-zinc-400">{scanning ? "Point at barcode" : "Starting camera..."}</p>
        </div>
        <button onClick={function() { if(html5QrcodeRef.current) { try{html5QrcodeRef.current.stop();}catch(e){} } onClose(); }}
          className="w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center text-zinc-300">✕</button>
      </div>
      <div className="flex-1 flex items-center justify-center bg-black">
        <div id="barcode-reader" style={{width:"100%",maxWidth:"500px"}}></div>
      </div>
      {error && (
        <div className="p-4 bg-red-500/10 border-t border-red-500/30 text-center">
          <p className="text-sm text-red-400">{error}</p>
          <button onClick={onClose} className="mt-2 px-4 py-2 bg-zinc-800 text-zinc-300 rounded-lg text-sm">Close</button>
        </div>
      )}
    </div>
  );
}

function POSScreen({ products, cart, setCart, onComplete }) {

  const showToast = (msg, type) => {
    setToast({ msg, type: type || "info" });
    setTimeout(() => setToast(null), 3000);
  };

  const addBarcodeProduct = useCallback((product) => {
    setCart(prev => {
      const key = product.id;
      const exists = prev.find(c => c.cartKey === key);
      if (exists) return prev.map(c => c.cartKey === key ? { ...c, qty: c.qty + 1, lineTotal: (c.qty + 1) * c.unitPrice } : c);
      return [...prev, { cartKey: key, id: product.id, name: product.name, image: product.image, qty: 1, unitPrice: product.price, lineTotal: product.price, unit: product.unit, type: "barcode", cost: product.cost }];
    });
  }, [setCart]);

  const addWeightProduct = (product, weight, total) => {
    const key = `${product.id}_${Date.now()}`;
    setCart(prev => [...prev, { cartKey: key, id: product.id, name: `${product.name} (${weight}kg)`, image: product.image, qty: 1, unitPrice: total, lineTotal: total, unit: `${weight}kg`, type: "weight", weight, cost: product.cost * weight }]);
    setWeightModal(null);
  };

  const addPieceProduct = (product, count, total) => {
    setCart(prev => {
      const key = product.id;
      const exists = prev.find(c => c.cartKey === key);
      if (exists) { const newQty = exists.qty + count; return prev.map(c => c.cartKey === key ? { ...c, qty: newQty, lineTotal: newQty * c.unitPrice } : c); }
      return [...prev, { cartKey: key, id: product.id, name: product.name, image: product.image, qty: count, unitPrice: product.pricePerPiece, lineTotal: total, unit: "pcs", type: "piece", cost: product.cost }];
    });

    const variant = product.variants[variantIdx];
    const key = `${product.id}_v${variantIdx}`;
    setCart(prev => {
      const exists = prev.find(c => c.cartKey === key);
      if (exists) { const newQty = exists.qty + qty; return prev.map(c => c.cartKey === key ? { ...c, qty: newQty, lineTotal: newQty * c.unitPrice } : c); }

    switch (product.type) {

      case "piece": setPieceModal(product); break;

    setShowCamera(false);
    // Auto-open the right modal based on product type
    switch (product.type) {
      case "weight": setWeightModal(product); break;
      case "piece": setPieceModal(product); break;
      case "variant": setVariantModal(product); break;
      case "barcode": addBarcodeProduct(product); break;

  const handleBarcodeScan = () => {
    if (!barcodeInput.trim()) return;
    const query = barcodeInput.trim();
    // Try barcode match first

    // Then try product ID match

      setBarcodeInput("");

      // Flash the input red briefly to indicate not found
      alert("Product not found: " + query);
    }
  };

  const updateQty = (cartKey, delta) => {
    setCart(prev => prev.map(c => {
      if (c.cartKey !== cartKey) return c;
      const newQty = Math.max(0, c.qty + delta);
      return { ...c, qty: newQty, lineTotal: newQty * c.unitPrice };
    }).filter(c => c.qty > 0));

  const removeItem = (cartKey) => setCart(prev => prev.filter(c => c.cartKey !== cartKey));

  const filtered = products
    .filter(p => {

      return true;

    .filter(p => p.name.toLowerCase().includes(search.toLowerCase()) || (p.barcode && p.barcode.includes(search)) || p.id.toLowerCase().includes(search.toLowerCase()));

            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg>

            <span className="text-xs">AI</span>
          </button>
        </div>
      </div>

      <div className="px-4 pb-2">
        <SearchInput value={search} onChange={setSearch} placeholder="Search products by name..." />

        <div className="flex gap-2 min-w-max">
          {ALL_CATEGORIES.map(cat => (

                activeCategory === cat
                  ? cat === "Favourites" ? "bg-red-500/20 text-red-400 border border-red-500/30" : "bg-amber-500/20 text-amber-400 border border-amber-500/30"

      {weightModal && <WeightEntryModal product={weightModal} onAdd={(w, t) => addWeightProduct(weightModal, w, t)} onClose={() => setWeightModal(null)} />}
      {pieceModal && <PieceEntryModal product={pieceModal} onAdd={(c, t) => addPieceProduct(pieceModal, c, t)} onClose={() => setPieceModal(null)} />}
      {variantModal && <VariantModal product={variantModal} onAdd={(vi, q, t) => addVariantProduct(variantModal, vi, q, t)} onClose={() => setVariantModal(null)} />}

      {/* Toast notification */}
      {toast && (
        <div className={`fixed bottom-24 left-4 right-4 z-50 px-4 py-3 rounded-2xl shadow-2xl flex items-center gap-3 transition-all ${
          toast.type === "warn" ? "bg-amber-500/95 text-zinc-900" :

function ProductFormModal({ initial, onSave, onDelete, onClose, title }) {
  const today = new Date().toISOString().split("T")[0];
  const emptyForm = {name:"",brand:"",type:"barcode",category:"General",price:"",cost:"",stock:"",barcode:"",unit:"pc",image:"📦",pricePerKg:"",pricePerPiece:"",unitDesc:"",lastPurchaseDate:""};
  const [fp, setFp] = useState(initial ? {...emptyForm, ...initial, cost: initial.cost || "", lastPurchaseDate: initial.lastPurchaseDate || "", unitDesc: initial.unitDesc || ""} : emptyForm);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [dateAutoSet, setDateAutoSet] = useState(false);

  // Original stock so we can detect when user is adding new stock
  const originalStock = initial ? (Number(initial.stock) || 0) : 0;

  // Auto-detect stock increase → set lastPurchaseDate to today automatically
  const handleStockChange = (val) => {
    const newStock = Number(val) || 0;
    const updated = {...fp, stock: val};
    // If editing and new stock > original → this is a restocking, auto-date to today
    if (initial && newStock > originalStock && !fp.lastPurchaseDate) {
      updated.lastPurchaseDate = today;
      setDateAutoSet(true);
    } else if (initial && newStock > originalStock) {
      updated.lastPurchaseDate = today;
      setDateAutoSet(true);
    } else if (newStock <= originalStock) {
      // Stock reduced or unchanged — keep existing date, clear auto flag
      setDateAutoSet(false);
    }
    setFp(updated);
  };

  const salePrice = fp.type === "weight" ? Number(fp.pricePerKg) : fp.type === "piece" ? Number(fp.pricePerPiece) : Number(fp.price);
  const margin = salePrice > 0 && Number(fp.cost) > 0 ? Math.round(((salePrice - Number(fp.cost)) / salePrice) * 100) : null;

  const handleSave = () => {
    if (!fp.name.trim()) return;
    const prefix = fp.type === "weight" ? "W" : fp.type === "piece" ? "PC" : "P";
    const saved = {
      id: initial ? initial.id : prefix + String(Date.now()).slice(-4),
      type: fp.type, barcode: fp.barcode || "",
      name: fp.name, brand: fp.brand || "", category: fp.category || "General",
      cost: Number(fp.cost) || 0, stock: Number(fp.stock) || 0,
      unit: fp.type === "weight" ? "kg" : fp.type === "piece" ? "pcs" : "pc",
      unitDesc: fp.unitDesc || "",
      lastPurchaseDate: fp.lastPurchaseDate || "",
      image: fp.image || "📦"
    };
    if (fp.type === "barcode") saved.price = Number(fp.price) || 0;
    if (fp.type === "weight") { saved.pricePerKg = Number(fp.pricePerKg) || 0; saved.minWeight = 0.25; saved.weightStep = 0.25; }
    if (fp.type === "piece") saved.pricePerPiece = Number(fp.pricePerPiece) || 0;
    if (initial && initial.variants) saved.variants = initial.variants;
    onSave(saved);
  };

          {/* Product Name */}

          {/* Type + Category row */}

              <button type="button" onClick={function(){
                // Clean up any previous scanner remnants
                var old = document.getElementById("inv-bc-reader");
                if (old) old.parentNode && old.parentNode.removeChild(old);

                // Build overlay UI FIRST so the div exists before Html5Qrcode targets it
                var overlay = document.createElement("div");
                overlay.style.cssText = "position:fixed;inset:0;z-index:9999;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;";

                var scanDiv = document.createElement("div");
                scanDiv.id = "inv-bc-reader";
                scanDiv.style.cssText = "width:100%;max-width:400px;";

                var hint = document.createElement("p");
                hint.textContent = "Point camera at barcode";
                hint.style.cssText = "color:#a1a1aa;font-size:13px;margin:12px 0 0;text-align:center;";

                var closeBtn = document.createElement("button");
                closeBtn.textContent = "✕  Cancel";

                overlay.appendChild(scanDiv);
                overlay.appendChild(hint);
                overlay.appendChild(closeBtn);
                document.body.appendChild(overlay);

                var sc = null;
                var stopped = false;

                function cleanup() {
                  if (stopped) return;
                  stopped = true;
                  try { sc && sc.stop().catch(function(){}); } catch(e) {}
                  try { document.body.removeChild(overlay); } catch(e) {}
                }

                closeBtn.onclick = cleanup;

                try {
                  sc = new Html5Qrcode("inv-bc-reader");
                  sc.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: { width: 280, height: 150 } },
                    function(code) {
                      playBeep("success");
                      cleanup();
                      setFp(function(prev){ return Object.assign({}, prev, { barcode: code }); });
                    },
                    function() {}
                  ).catch(function(err) {
                    cleanup();
                    alert("Camera error: " + (err && err.message ? err.message : err));
                  });
                } catch(e) {
                  cleanup();
                  alert("Scanner error: " + (e && e.message ? e.message : "Camera not available. Make sure the app is opened over HTTPS."));
                }
              }} className="flex-shrink-0 px-4 bg-cyan-500/20 border border-cyan-500/40 text-cyan-400 rounded-xl font-bold text-sm active:scale-95 flex items-center gap-1.5 whitespace-nowrap">

                </label>
                {fp.type === "barcode" && <input type="number" value={fp.price} onChange={e => setFp({...fp, price: e.target.value})} placeholder="0" className={inp} />}
                {fp.type === "weight" && <input type="number" value={fp.pricePerKg} onChange={e => setFp({...fp, pricePerKg: e.target.value})} placeholder="0" className={inp} />}
                {fp.type === "piece" && <input type="number" value={fp.pricePerPiece} onChange={e => setFp({...fp, pricePerPiece: e.target.value})} placeholder="0" className={inp} />}
              </div>
              <div>
                <label className={lbl}>Purchase Price (UGX)</label>
                <input type="number" value={fp.cost} onChange={e => setFp({...fp, cost: e.target.value})} placeholder="0" className={inp} />
              </div>
            </div>
            {margin !== null && (
              <div className={`flex items-center gap-2 px-3 py-2 rounded-lg text-xs font-medium ${margin >= 20 ? "bg-emerald-500/10 text-emerald-400" : margin >= 5 ? "bg-amber-500/10 text-amber-400" : "bg-red-500/10 text-red-400"}`}>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                Margin: {margin}% {margin >= 20 ? "✓ Good" : margin >= 5 ? "— Low" : "✗ Very low"}
              </div>
            )}
          </div>

          {/* Stock + Unit Description */}
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className={lbl}>
                Stock Quantity
                {initial && <span className="ml-1 text-zinc-600 font-normal">(was {originalStock})</span>}
              </label>
              <input
                type="number"
                value={fp.stock}
                onChange={e => handleStockChange(e.target.value)}
                placeholder="0"
                className={inp}
              />
              {initial && Number(fp.stock) > originalStock && (
                <p className="text-xs text-emerald-400 mt-1">
                  +{Number(fp.stock) - originalStock} units added
                </p>
              )}
            </div>
            <div>
              <label className={lbl}>Unit Description</label>
              <input type="text" value={fp.unitDesc} onChange={e => setFp({...fp, unitDesc: e.target.value})} placeholder="e.g. 500g, 500ml, 1kg" className={inp} />
            </div>
          </div>

          {/* Last Purchase Date */}
          <div>
            <div className="flex items-center justify-between mb-1">
              <label className={lbl} style={{margin:0}}>Last Purchase Date</label>
              {dateAutoSet && (
                <span className="text-xs text-emerald-400 flex items-center gap-1">
                  <svg width="11" height="11" fill="currentColor" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                  Auto-detected today
                </span>
              )}
            </div>
            <input
              type="date"
              value={fp.lastPurchaseDate}
              onChange={e => { setFp({...fp, lastPurchaseDate: e.target.value}); setDateAutoSet(false); }}
              className={inp}
            />
          </div>

          {/* Actions */}
          <div className="flex gap-3 pt-2">
            <button onClick={onClose} className="flex-1 py-3.5 rounded-xl bg-zinc-800 border border-zinc-700 text-zinc-300 font-medium text-sm active:scale-95 transition-all">
              Cancel
            </button>
            <button onClick={handleSave} disabled={!fp.name.trim()} className="flex-1 py-3.5 rounded-xl bg-amber-500 text-zinc-900 font-bold text-sm active:scale-95 disabled:opacity-40 transition-all shadow-lg shadow-amber-500/20">
              {initial ? "Save Changes" : "Add Product"}
            </button>
          </div>

          {/* Delete — only shown when editing */}
          {initial && onDelete && !confirmDelete && (
            <button onClick={() => setConfirmDelete(true)} className="w-full py-3 rounded-xl border border-red-500/30 text-red-400 text-sm font-medium active:scale-95 transition-all flex items-center justify-center gap-2 mb-4">
              <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
              Delete this product
            </button>
          )}
          {confirmDelete && (
            <div className="mb-4 bg-red-500/10 border border-red-500/30 rounded-xl p-4">
              <p className="text-sm text-red-300 font-medium text-center mb-3">Are you sure? This cannot be undone.</p>
              <div className="flex gap-2">
                <button onClick={() => setConfirmDelete(false)} className="flex-1 py-2.5 rounded-lg bg-zinc-800 text-zinc-300 text-sm font-medium">Cancel</button>
                <button onClick={() => onDelete(initial.id)} className="flex-1 py-2.5 rounded-lg bg-red-600 text-white text-sm font-bold">Delete</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// Approval Modal — requires Admin or Manager PIN for Cashier actions
// ═══════════════════════════════════════════════════════════════
function ApprovalModal({ action, onApproved, onCancel }) {
  const [pin, setPin] = useState("");
  const [checking, setChecking] = useState(false);
  const [error, setError] = useState("");
  const [shake, setShake] = useState(false);

  const actionLabels = {
    add:    { label: "Add Product",    icon: "📦", color: "text-blue-400" },
    edit:   { label: "Edit Product",   icon: "✏️",  color: "text-amber-400" },
    delete: { label: "Delete Product", icon: "🗑",  color: "text-red-400" },
  };
  const info = actionLabels[action] || { label: action, icon: "🔐", color: "text-zinc-400" };

  const handleKey = async (k) => {
    if (k === "DEL") { setPin(p => p.slice(0, -1)); setError(""); return; }
    if (k === "OK") {
      if (pin.length < 4) { setShake(true); setTimeout(() => setShake(false), 500); return; }
      setChecking(true);
      setError("");

      // 1. Try API — check if this PIN belongs to Admin or Manager
      if (api.isConfigured()) {
        try {
          const result = await api.post("login", { pin });
          if (result && result.success && result.user) {
            const role = (result.user.role || "").toLowerCase();
            if (role === "admin" || role === "manager") {
              setChecking(false);
              onApproved(result.user);
              return;
            } else {
              setError("Only Admin or Manager can approve this.");
              setPin(""); setShake(true); setTimeout(() => setShake(false), 500);
              setChecking(false);
              return;
            }
          }
        } catch(e) { /* fall through to offline check */ }
      }

      // 2. Offline fallback
      const adminPins = ["1234"];   // Admin default
      const managerPins = ["5678"]; // Manager default
      if (adminPins.includes(pin)) {
        setChecking(false);
        onApproved({ id: "admin", name: "Admin", role: "Admin" });
        return;
      }
      if (managerPins.includes(pin)) {
        setChecking(false);
        onApproved({ id: "manager", name: "Manager", role: "Manager" });
        return;
      }

      setError("Wrong PIN or insufficient role.");
      setPin(""); setShake(true); setTimeout(() => setShake(false), 500);
      setChecking(false);
      return;
    }
    if (pin.length < 6) { setPin(p => p + k); setError(""); }
  };

  return (
    <div className="fixed inset-0 z-[60] bg-black/80 flex items-center justify-center px-5" onClick={e => { if(e.target === e.currentTarget) onCancel(); }}>
      <div className="w-full max-w-xs bg-zinc-900 border border-zinc-700 rounded-3xl overflow-hidden shadow-2xl">
        {/* Header */}
        <div className="px-6 pt-6 pb-4 text-center border-b border-zinc-800">
          <div className="w-14 h-14 rounded-2xl bg-zinc-800 border border-zinc-700 flex items-center justify-center text-2xl mx-auto mb-3">🔐</div>
          <h3 className="text-base font-bold text-zinc-100" style={{fontFamily:"'DM Sans',sans-serif"}}>Approval Required</h3>
          <p className="text-xs text-zinc-400 mt-1">
            <span className={info.color}>{info.icon} {info.label}</span>
            {" "}requires Admin or Manager PIN
          </p>
        </div>

        <div className="px-5 py-4">
          {/* PIN dots */}
          <div className={`flex justify-center gap-3 mb-4 ${shake ? "animate-bounce" : ""}`}>
            {[0,1,2,3].map(i => (
              <div key={i} className={`w-11 h-11 rounded-xl border-2 flex items-center justify-center transition-all ${i < pin.length ? "border-amber-500 bg-amber-500/10" : "border-zinc-700 bg-zinc-800/50"}`}>
                {i < pin.length && <div className="w-3 h-3 rounded-full bg-amber-400" />}
              </div>
            ))}
          </div>

          {/* Keypad */}
          <div className="grid grid-cols-3 gap-2">
            {["1","2","3","4","5","6","7","8","9","DEL","0","OK"].map(k => (
              <button key={k} onClick={() => handleKey(k)}
                className={`h-12 rounded-xl font-semibold text-base transition-all active:scale-95 ${
                  k === "OK"  ? "bg-amber-500 text-zinc-900 shadow-lg shadow-amber-500/20" :
                  k === "DEL" ? "bg-zinc-800 text-zinc-400" :
                  "bg-zinc-800 text-zinc-200 border border-zinc-700"
                }`}>
                {k === "DEL" ? "⌫" : k === "OK" && checking
                  ? <span className="inline-block w-4 h-4 border-2 border-zinc-900 border-t-transparent rounded-full animate-spin" />
                  : k}
              </button>
            ))}
          </div>

          {error && <p className="text-center text-red-400 text-xs mt-3 font-medium">{error}</p>}

          <button onClick={onCancel} className="w-full mt-3 py-2.5 rounded-xl bg-zinc-800 text-zinc-400 text-sm font-medium active:scale-95 transition-all">
            Cancel
          </button>
        </div>
      </div>
    </div>
  );
}

function InventoryScreen({ products, setProducts, refreshProducts, autoOpenAdd, onAddOpened, user }) {
  const [search, setSearch] = useState("");
  const [filterType, setFilterType] = useState("all");
  const [showAddForm, setShowAddForm] = useState(false);
  const [editingProduct, setEditingProduct] = useState(null);

  // Approval gate state
  const isCashier = !user || (user.role || "").toLowerCase() === "cashier";
  const [pendingAction, setPendingAction] = useState(null); // {type:"add"|"edit"|"delete", payload}
  const [showApproval, setShowApproval] = useState(false);

  // Called when Cashier taps Add / Edit / Delete — show approval first
  const requireApproval = (type, payload) => {
    if (!isCashier) {
      // Admin or Manager — proceed directly
      executePendingAction(type, payload);
    } else {
      setPendingAction({ type, payload });
      setShowApproval(true);
    }
  };

  const onApprovalGranted = () => {
    setShowApproval(false);
    if (pendingAction) {
      executePendingAction(pendingAction.type, pendingAction.payload);
      setPendingAction(null);
    }
  };

  const onApprovalCancelled = () => {
    setShowApproval(false);
    setPendingAction(null);
  };

  const executePendingAction = (type, payload) => {
    if (type === "add") {
      setShowAddForm(true);
    } else if (type === "edit") {
      setEditingProduct(payload);
    } else if (type === "delete") {
      handleDelete(payload);
    }
  };

  useEffect(() => {
    if (autoOpenAdd) {
      requireApproval("add", null);
      if (onAddOpened) onAddOpened();
    }
  }, [autoOpenAdd]);

  const getStock = (p) => p.type === "variant" ? p.variants.reduce((s, v) => s + v.stock, 0) : (p.stock || 0);
  const getPrice = (p) => p.type === "weight" ? p.pricePerKg : p.type === "piece" ? p.pricePerPiece : p.type === "variant" ? (p.variants && p.variants[0] ? p.variants[0].price : 0) : p.price;

  const filtered = products
    .filter(p => filterType === "all" || p.type === filterType)
    .filter(p => {
      const q = search.toLowerCase();
      return p.name.toLowerCase().includes(q) || (p.brand && p.brand.toLowerCase().includes(q)) || (p.barcode && p.barcode.includes(q)) || (p.category && p.category.toLowerCase().includes(q));
    })
    .sort((a, b) => a.name.localeCompare(b.name));

  const handleAdd = async (saved) => {
    // 1. Update React state immediately (UI responds instantly)
    if (setProducts) setProducts(prev => [...prev, saved]);
    setShowAddForm(false);
    // 2. Save to IndexedDB so it survives page reload / tab switch
    try { await dbPut("products", saved); } catch(e) { console.warn("dbPut failed:", e); }
    // 3. Push to Google Sheets if API configured, then refresh so cache reflects confirmed server state
    if (api.isConfigured()) {
      try {
        await api.post("addProduct", { ...saved, deviceId: DEVICE_ID });
        // Small delay so Sheets has time to commit, then pull fresh list
        await new Promise(r => setTimeout(r, 1500));
        await refreshProducts();
      } catch(e) { console.warn("addProduct API failed — saved locally only:", e); }
    }
  };

  const handleEdit = async (saved) => {
    // 1. Update React state immediately
    if (setProducts) setProducts(prev => prev.map(p => p.id === saved.id ? saved : p));
    setEditingProduct(null);
    // 2. Update in IndexedDB
    try { await dbPut("products", saved); } catch(e) { console.warn("dbPut failed:", e); }
    // 3. Push to Google Sheets
    if (api.isConfigured()) {
      try {
        await api.post("updateProduct", { ...saved, productId: saved.id, deviceId: DEVICE_ID });
        await new Promise(r => setTimeout(r, 1500));
        await refreshProducts();
      } catch(e) { console.warn("updateProduct API failed:", e); }
    }
  };

  const handleDelete = async (id) => {
    // 1. Update React state immediately
    if (setProducts) setProducts(prev => prev.filter(p => p.id !== id));
    // 2. Remove from IndexedDB
    try { await dbDelete("products", id); } catch(e) { console.warn("dbDelete failed:", e); }
    // 3. Persist to Google Sheets
    if (api.isConfigured()) {
      try { await api.post("deleteProduct", { productId: id, deviceId: DEVICE_ID }); }
      catch(e) { console.warn("deleteProduct API failed:", e); }
    }
  };

  const filterOptions = [
    { id: "all", label: "All Items" },
    { id: "barcode", label: "Barcoded" },
    { id: "weight", label: "By Weight" },
    { id: "piece", label: "By Piece" },
    { id: "variant", label: "Variants" },
  ];

  return (
    <div className="flex flex-col h-full bg-zinc-950">
      {/* Top bar */}
      <div className="px-4 pt-4 pb-3 border-b border-zinc-800/60">
        <h2 className="text-lg font-bold text-zinc-100 mb-3" style={{fontFamily:"'DM Sans',sans-serif"}}>Inventory List</h2>

        {/* Search */}
        <div className="relative mb-3">
          <svg className="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input
            type="text" value={search} onChange={e => setSearch(e.target.value)}
            placeholder="Search products..."
            className="w-full bg-zinc-800/70 border border-zinc-700/50 rounded-xl pl-9 pr-4 py-2.5 text-sm text-zinc-200 placeholder-zinc-500 focus:outline-none focus:border-amber-500/60 transition-colors"
          />
        </div>

        {/* Add button + filter dropdown */}
        <div className="flex items-center gap-3">
          <button onClick={() => requireApproval("add", null)}
            className="flex items-center gap-2 px-4 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold text-sm active:scale-95 transition-all shadow-lg shadow-emerald-600/20">
            <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add
          </button>
          <div className="flex-1" />
          <div className="relative">
            <select value={filterType} onChange={e => setFilterType(e.target.value)}
              className="appearance-none bg-zinc-800/70 border border-zinc-700/50 rounded-xl pl-3 pr-8 py-2.5 text-sm text-zinc-300 focus:outline-none focus:border-amber-500/60 cursor-pointer">
              {filterOptions.map(o => <option key={o.id} value={o.id}>{o.label}</option>)}
            </select>

          const salePrice = getPrice(p);
          const stockLow = stock <= 5;
          const stockWarn = stock <= 15 && stock > 5;
          const priceLabel = p.type === "weight" ? `Ugx${salePrice?.toLocaleString()}/kg` :
                             p.type === "piece" ? `Ugx${salePrice?.toLocaleString()}/pc` :
                             `Ugx${salePrice?.toLocaleString()}`;
          const unitLabel = p.type === "weight" ? `${stock} kg` : p.type === "piece" ? `${stock} pcs` : `${stock} ${p.unit || "pc"}`;

          return (
            <div key={p.id} className="bg-white/5 border border-zinc-700/40 rounded-2xl p-3 flex items-start gap-3">
              {/* Image box */}
              <div className="w-16 h-16 flex-shrink-0 bg-zinc-700/50 rounded-xl border border-zinc-600/30 flex items-center justify-center">
                <span className="text-3xl">{p.image || "📦"}</span>

              <div className="flex-1 min-w-0 py-0.5">

                <p className="text-xs text-zinc-500 mt-0.5">Category: <span className="text-zinc-300">{p.category || "General"}</span></p>
                <p className="text-xs mt-0.5">
                  <span className="text-zinc-500">In Stock: </span>
                  <span className={`font-medium ${stockLow ? "text-red-400" : stockWarn ? "text-amber-400" : "text-zinc-300"}`}>
                    {stock} {p.unitDesc || (p.type === "weight" ? "kg" : p.type === "piece" ? "pcs" : p.unit || "pc")}
                    {stockLow ? " ⚠" : ""}
                  </span>
                </p>
                <p className="text-xs text-zinc-500 mt-0.5">Sale Price: <span className="text-amber-400 font-medium">{priceLabel}</span></p>
                {p.cost > 0 && (
                  <p className="text-xs text-zinc-500 mt-0.5">Purchase Price: <span className="text-zinc-300">Ugx{p.cost.toLocaleString()}</span></p>
                )}
                {p.lastPurchaseDate && (
                  <p className="text-xs text-zinc-500 mt-0.5">Last Purchase Date: <span className="text-zinc-300">{new Date(p.lastPurchaseDate).toLocaleDateString("en-UG", {day:"2-digit", month:"short", year:"numeric"})}</span></p>
                )}
              </div>

              {/* Edit button only */}
              <div className="flex-shrink-0 pt-0.5">
                <button onClick={() => requireApproval("edit", p)}
                  className="w-9 h-9 rounded-xl bg-emerald-500/15 border border-emerald-500/30 text-emerald-400 flex items-center justify-center active:scale-90 transition-all">
                  <svg width="15" height="15" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </button>
              </div>
            </div>
          );
        })}
      </div>

      {/* Add product modal */}
      {showAddForm && <ProductFormModal title="Add New Product" onSave={handleAdd} onClose={() => setShowAddForm(false)} />}

      {/* Edit product modal */}
      {editingProduct && <ProductFormModal title="Edit Product" initial={editingProduct} onSave={handleEdit} onDelete={(id) => { setEditingProduct(null); requireApproval("delete", id); }} onClose={() => setEditingProduct(null)} />}

      {/* Approval modal — shown to Cashier before any stock change */}
      {showApproval && (
        <ApprovalModal
          action={pendingAction ? pendingAction.type : "edit"}
          onApproved={onApprovalGranted}
          onCancel={onApprovalCancelled}
        />
      )}
    </div>
  );
}

function LoginScreen({ onLogin }) {
  const [pin, setPin] = useState("");
  const [shake, setShake] = useState(false);
  const [user, setUser] = useState("Cashier");
  const [checking, setChecking] = useState(false);
  const [error, setError] = useState("");

  const handleKey = async (k) => {
    if (k === "DEL") { setPin(p => p.slice(0, -1)); setError(""); return; }
    if (k === "OK") {
      if (pin.length < 4) { setShake(true); setTimeout(() => setShake(false), 500); return; }
      setChecking(true);
      setError("");

      // ── 1. Try API login (background) ───────────────────────────
      if (api.isConfigured()) {
        try {
          const result = await api.post("login", { username: user, pin });
          if (result && result.success && result.user) {
            setChecking(false);
            onLogin(result.user);
            return;
          }
          // If API returned success:false, fall through to offline check
          // (API may have column issues or PIN format mismatch — offline is the safety net)
        } catch (e) { /* network error — fall through */ }
      }

      // ── 2. Offline fallback (always runs if API didn't succeed) ──
      // Matches PIN against known defaults AND the selected role
      const offlineMap = { Admin: ["1234"], Manager: ["5678"], Cashier: ["0000", "0"] };
      const validPins = offlineMap[user] || [];
      if (validPins.includes(pin) || validPins.includes(pin.replace(/^0+/, "") || "0")) {
        setChecking(false);
        onLogin({ id: user.toLowerCase(), name: user, role: user });
        return;
      }

      // ── 3. Both failed ────────────────────────────────────────────
      setError("Wrong PIN. Try again.");
      setPin("");
      setShake(true);
      setTimeout(() => setShake(false), 500);
      setChecking(false);
      return;
    }
    if (pin.length < 6) { setPin(p => p + k); setError(""); }
  };

  return (
    <div className="min-h-screen bg-zinc-950 flex flex-col items-center justify-center p-6" style={{ background: "radial-gradient(ellipse at 50% 0%, rgba(245,158,11,0.08) 0%, rgba(9,9,11,1) 60%)" }}>
      <div className="w-full max-w-sm">
        <div className="text-center mb-10">
          <div className="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-gradient-to-br from-amber-500 to-orange-600 mb-4 shadow-lg shadow-amber-500/20"><span className="text-4xl">🏪</span></div>
          <h1 className="text-2xl font-bold text-zinc-100 tracking-tight" style={{ fontFamily: "'DM Sans', sans-serif" }}>Oola RetailFlow</h1>
          <p className="text-zinc-500 text-sm mt-1">Point of Sale System</p>
        </div>
        <div className="flex gap-2 mb-6 bg-zinc-900/80 rounded-xl p-1 border border-zinc-800/50">
          {["Admin", "Manager", "Cashier"].map(u => (
            <button key={u} onClick={() => setUser(u)} className={`flex-1 py-2 rounded-lg text-sm font-medium transition-all ${user === u ? "bg-amber-500/20 text-amber-400 border border-amber-500/30" : "text-zinc-500 hover:text-zinc-300"}`}>{u}</button>
          ))}
        </div>
        <div className={`flex justify-center gap-3 mb-8 ${shake ? "animate-bounce" : ""}`}>
          {[0,1,2,3].map(i => (
            <div key={i} className={`w-12 h-12 rounded-xl border-2 flex items-center justify-center transition-all ${i < pin.length ? "border-amber-500 bg-amber-500/10" : "border-zinc-700 bg-zinc-900/50"}`}>
              {i < pin.length && <div className="w-3 h-3 rounded-full bg-amber-400"/>}
            </div>
          ))}
        </div>
        <div className="grid grid-cols-3 gap-3">
          {["1","2","3","4","5","6","7","8","9","DEL","0","OK"].map(k => (
            <button key={k} onClick={() => handleKey(k)}
              className={`h-14 rounded-xl font-semibold text-lg transition-all active:scale-95 ${k === "OK" ? "bg-amber-500 text-zinc-900 hover:bg-amber-400 shadow-lg shadow-amber-500/20" : k === "DEL" ? "bg-zinc-800 text-zinc-400 hover:bg-zinc-700" : "bg-zinc-900 text-zinc-200 hover:bg-zinc-800 border border-zinc-800"}`}>
              {k === "OK" && checking
                ? <span className="inline-block w-5 h-5 border-2 border-zinc-900 border-t-transparent rounded-full animate-spin" />
                : k === "DEL" ? "⌫" : k}
            </button>
          ))}
        </div>
        {error && <p className="text-center text-red-400 text-sm mt-4 font-medium">{error}</p>}
        {checking && !error && <p className="text-center text-amber-400 text-xs mt-4">Checking...</p>}
        <p className="text-center text-zinc-600 text-xs mt-3">{api.isConfigured() ? "PIN validated against your Google Sheet" : "Offline mode — using default PINs"}</p>
      </div>
    </div>
  );
}

// Settings + Data Recovery Panel
