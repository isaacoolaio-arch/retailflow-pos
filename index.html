function SettingsPanel({ online, source, pendingCount, products, setProducts, setSales, setPendingCount, refreshProducts, onSync, onClose }) {
  const [recovering, setRecovering] = useState(false);
  const [recoverLog, setRecoverLog] = useState([]);
  const [localStats, setLocalStats] = useState(null);
  const [recovered, setRecovered] = useState(false);

  // Load local stats on open
  useEffect(() => {
    const load = async () => {
      const pending = await dbGetAll("pendingSales");
      const cached  = await dbGetAll("products");
      setLocalStats({ pendingSales: pending.length, cachedProducts: cached.length });
    };
    load();
  }, []);

  const log = (msg, type) => setRecoverLog(prev => [...prev, { msg, type: type || "info", t: new Date().toLocaleTimeString() }]);

  const handleRecoverAll = async () => {
    if (!online || !api.isConfigured()) {
      log("You must be online to recover data", "error");
      return;
    }
    setRecovering(true);
    setRecoverLog([]);
    let totalSynced = 0;
    let totalFailed = 0;

    // ── 1. Recover pending sales ────────────────────────────────
    log("Reading pending sales from device...");
    const pendingSales = await dbGetAll("pendingSales");
    if (pendingSales.length === 0) {
      log("No pending sales found locally", "ok");
    } else {
      log(`Found ${pendingSales.length} pending sale(s) — pushing to Sheets...`);
      try {
        const result = await api.post("syncSales", { sales: pendingSales });
        if (result && result.success) {
          for (const r of (result.results || [])) {
            if (r.success && r.offlineId) {
              await dbDelete("pendingSales", r.offlineId);
              totalSynced++;
            } else {
              totalFailed++;
            }
          }
          log(`✓ Sales synced: ${result.synced || 0}, failed: ${result.failed || 0}`, result.synced > 0 ? "ok" : "warn");
          const remaining = await dbGetAll("pendingSales");
          setPendingCount(remaining.length);
        } else {
          log("Sales sync returned no result — check API URL", "error");
        }
      } catch (e) {
        log("Sales sync error: " + e.message, "error");
      }
    }

    // ── 2. Recover locally-added products not in Sheets ─────────
    log("Checking for local-only products...");
    try {
      const apiResult = await api.get("getProducts");
      const apiProducts = (apiResult && apiResult.success) ? apiResult.products : [];
      const cachedProducts = await dbGetAll("products");

      // A product needs pushing if its ID is not in Sheets at all
      // Skip only the known MOCK/demo IDs that ship with the app
      const DEMO_IDS = new Set([
        "P001","P002","P003","P004","P005",
        "W001","W002","W003","W004","W005","W006","W007","W008",
        "PC01","PC02","PC03","PC04",
        "V001","V002","V003"
      ]);

      // Build live set of IDs already in Sheets
      let sheetsIds = new Set(apiProducts.map(p => p.id));

      const localOnly = cachedProducts.filter(p =>
        p.id &&
        !sheetsIds.has(p.id) &&   // not already in Sheets
        !DEMO_IDS.has(p.id) &&    // not a demo product
        p.name                    // must have a name
      );

      if (localOnly.length === 0) {
        log(`All ${cachedProducts.length} local product(s) already in Sheets ✓`, "ok");
      } else {
        log(`Found ${localOnly.length} product(s) not yet in Sheets — warming up server...`);

        // Warm up Apps Script with a GET ping first so it's not cold when we POST
        try {
          await api.get("warmup");
          log("Server is awake — pushing products now...", "ok");
        } catch(e) { log("Warmup failed, trying anyway...", "warn"); }

        let prodSynced = 0;
        for (const p of localOnly) {
          // ── Re-check live against Sheets right before each push ──
          // This prevents duplicates when multiple devices run recovery simultaneously
          try {
            const liveCheck = await api.get("getProducts");
            if (liveCheck && liveCheck.success) {
              const liveIds = new Set(liveCheck.products.map(x => x.id));
              if (liveIds.has(p.id)) {
                log(`  ↷ ${p.name} already in Sheets (added by another device) — skipping`, "ok");
                prodSynced++;
                continue;
              }
            }
          } catch(e) { /* live check failed, proceed with push anyway */ }

          log(`  Pushing: ${p.name}...`);
          let r = null;
          for (let attempt = 1; attempt <= 3; attempt++) {
            try {
              r = await api.post("addProduct", { ...p, deviceId: DEVICE_ID });
              if (r && r.success) break;
              if (r && r.error) {
                log(`  ✗ ${p.name} — server error: ${r.error}`, "error");
                break;
              }
              if (attempt < 3) {
                log(`  Retry ${attempt + 1}/3 for ${p.name}...`);
                await new Promise(res => setTimeout(res, 3000));
              }
            } catch (e) {
              if (attempt < 3) await new Promise(res => setTimeout(res, 2000));
            }
          }
          if (r && r.success) {
            prodSynced++;
            log(`  ✓ ${p.name} saved (ID: ${r.productId || p.id})`, "ok");
          } else if (!r) {
            log(`  ✗ ${p.name} — no response after 3 attempts. Check Apps Script deployment.`, "error");
          }
        }
        log(`Products pushed: ${prodSynced} / ${localOnly.length}`, prodSynced === localOnly.length ? "ok" : "warn");
      }
    } catch (e) {
      log("Product check error: " + e.message, "error");
    }

    // ── 3. Pull fresh data from Sheets ──────────────────────────
    log("Pulling fresh data from Sheets...");
    try {
      await refreshProducts();
      log("✓ Products refreshed from Sheets", "ok");
    } catch (e) { log("Refresh failed: " + e.message, "error"); }

    const stats = await dbGetAll("pendingSales");
    setLocalStats(prev => ({ ...prev, pendingSales: stats.length }));
    setRecovered(true);
    setRecovering(false);
    log("─── Recovery complete ───", "ok");
  };

  const typeColor = t => t === "ok" ? "text-emerald-400" : t === "error" ? "text-red-400" : t === "warn" ? "text-amber-400" : "text-zinc-400";

  return (
    <div className="fixed inset-0 z-50 bg-black/60 flex items-end" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="w-full bg-zinc-900 border-t border-zinc-700/60 rounded-t-3xl max-h-[85vh] flex flex-col">
        {/* Handle */}
        <div className="flex justify-center pt-3 pb-1 flex-shrink-0"><div className="w-10 h-1 bg-zinc-700 rounded-full" /></div>

        {/* Header */}
        <div className="flex items-center justify-between px-5 py-3 border-b border-zinc-800 flex-shrink-0">
          <h2 className="text-base font-bold text-zinc-100" style={{fontFamily:"'DM Sans',sans-serif"}}>Settings & Data Recovery</h2>
          <button onClick={onClose} className="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center text-zinc-400">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div className="flex-1 overflow-y-auto px-5 py-4 space-y-4">
          {/* Status cards */}
          <div className="grid grid-cols-2 gap-3">
            <div className="bg-zinc-800/60 rounded-xl p-3 border border-zinc-700/30">
              <p className="text-xs text-zinc-500">Connection</p>
              <p className={`text-sm font-bold mt-0.5 ${online ? "text-emerald-400" : "text-red-400"}`}>{online ? "🟢 Online" : "🔴 Offline"}</p>
            </div>
            <div className="bg-zinc-800/60 rounded-xl p-3 border border-zinc-700/30">
              <p className="text-xs text-zinc-500">Data Source</p>
              <p className={`text-sm font-bold mt-0.5 ${source === "api" ? "text-emerald-400" : source === "cache" ? "text-blue-400" : "text-zinc-400"}`}>
                {source === "api" ? "Live" : source === "cache" ? "Cached" : "Demo"}
              </p>
            </div>
            <div className={`rounded-xl p-3 border ${pendingCount > 0 ? "bg-amber-500/10 border-amber-500/30" : "bg-zinc-800/60 border-zinc-700/30"}`}>
              <p className="text-xs text-zinc-500">Pending Sales</p>
              <p className={`text-sm font-bold mt-0.5 ${pendingCount > 0 ? "text-amber-400" : "text-emerald-400"}`}>
                {pendingCount > 0 ? `${pendingCount} unsynced` : "All synced ✓"}
              </p>
            </div>
            <div className="bg-zinc-800/60 rounded-xl p-3 border border-zinc-700/30">
              <p className="text-xs text-zinc-500">Local Products</p>
              <p className="text-sm font-bold text-zinc-300 mt-0.5">{localStats ? localStats.cachedProducts : "—"} cached</p>
            </div>
          </div>

          {/* API URL */}
          <div className="bg-zinc-800/50 rounded-xl p-3">
            <p className="text-xs text-zinc-500 mb-1">API URL</p>
            <p className="text-xs text-zinc-400 font-mono break-all leading-relaxed">
              {API_URL || "⚠ Not configured — set API_URL in index.html"}
            </p>
          </div>

          {/* Recovery section */}
          <div className="bg-amber-500/8 border border-amber-500/25 rounded-xl p-4 space-y-3">
            <div>
              <p className="text-sm font-bold text-amber-400">🔄 Data Recovery</p>
              <p className="text-xs text-zinc-400 mt-1 leading-relaxed">
                Push all locally-stored data that hasn't reached Google Sheets yet — pending sales and locally-added products.
              </p>
            </div>

            {recoverLog.length > 0 && (
              <div className="bg-zinc-950 rounded-lg p-3 max-h-48 overflow-y-auto space-y-1">
                {recoverLog.map((l, i) => (
                  <p key={i} className={`text-xs font-mono ${typeColor(l.type)}`}>
                    <span className="text-zinc-600">{l.t} </span>{l.msg}
                  </p>
                ))}
                {recovering && <p className="text-xs text-amber-400 animate-pulse font-mono">Working...</p>}
              </div>
            )}

            <button
              onClick={handleRecoverAll}
              disabled={recovering || !online || !api.isConfigured()}
              className={`w-full py-3.5 rounded-xl font-bold text-sm flex items-center justify-center gap-2 active:scale-95 transition-all ${
                recovered ? "bg-emerald-600 text-white" :
                recovering ? "bg-zinc-700 text-zinc-400" :
                !online ? "bg-zinc-800 text-zinc-500" :
                "bg-amber-500 text-zinc-900 shadow-lg shadow-amber-500/20"
              }`}
            >
              {recovering ? (
                <><span className="w-4 h-4 border-2 border-zinc-500 border-t-zinc-200 rounded-full animate-spin" /> Recovering...</>
              ) : recovered ? (
                <>✓ Recovery Complete</>
              ) : !online ? (
                <>Go online to recover</>
              ) : (
                <>⬆ Push All Local Data to Sheets</>
              )}
            </button>
            {!api.isConfigured() && <p className="text-xs text-red-400 text-center">API URL not set — cannot sync</p>}
          </div>

          {/* Quick sync */}
          <div className="flex gap-3 pb-4">
            <button onClick={() => { onSync(); onClose(); }} disabled={!online}
              className="flex-1 py-3 rounded-xl bg-zinc-800 border border-zinc-700 text-zinc-300 font-medium text-sm flex items-center justify-center gap-1.5 disabled:opacity-40 active:scale-95 transition-all">
              <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>
              Quick Sync
            </button>
            <button onClick={onClose} className="flex-1 py-3 rounded-xl bg-zinc-800 border border-zinc-700 text-zinc-300 font-medium text-sm active:scale-95 transition-all">
              Close
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function RetailFlowPOS() {
  const [loggedIn, setLoggedIn] = useState(false);
  const [user, setUser] = useState(null);
  const [activeTab, setActiveTab] = useState("dashboard");
  const [autoOpenAdd, setAutoOpenAdd] = useState(false);
  const { products, setProducts, loading, source, refreshProducts } = useProducts();
  const [cart, setCart] = useState([]);
  const [sales, setSales] = useState([]);
  const [showPayment, setShowPayment] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [showDrawer, setShowDrawer] = useState(false);
  const { online, pendingCount, lastSync, syncing, setPendingCount } = useOnlineStatus();

  const cartTotal = cart.reduce((sum, c) => sum + c.lineTotal, 0);
  const cartCount = cart.reduce((sum, c) => sum + c.qty, 0);

  // Load sales from cache on startup
  useEffect(() => {
    const loadSales = async () => {
      if (api.isConfigured()) {
        // API is configured — always pull from Sheets (source of truth)
        // Clear any stale cached sales first so demo/old data never shows
        await dbClear("syncedSales");
        const today = new Date().toISOString().split("T")[0];
        const result = await api.get("getSales", { date: today, limit: "200" });
        if (result && result.success) {
          setSales(result.sales || []);
          await dbPut("syncedSales", result.sales || []);
        } else {
          // API failed — show empty, not stale cache
          setSales([]);
        }
      } else {
        // No API — load from local cache only
        try {
          const cached = await dbGetAll("syncedSales");
          if (cached.length > 0) setSales(cached);
        } catch (e) { /* ignore */ }
      }
    };
    if (loggedIn) loadSales();
  }, [loggedIn]);

  const handleCompleteSale = async (paymentInfo) => {
    const offlineId = "OFF_" + Date.now() + "_" + Math.random().toString(36).substr(2, 6);
    const now = new Date();
    const saleData = {
      offlineId,
      dateTime: now.toISOString(),
      items: cart.map(c => ({ ...c })),
      total: cartTotal,
      paymentMethod: paymentInfo.method,
      amountPaid: paymentInfo.amountPaid,
      change: paymentInfo.change,
      cashierId: (user && user.id ? user.id : ""),
      cashierName: (user && user.name ? user.name : ""),
    };

    // Add to local sales list for display
    const localSale = {
      id: offlineId,
      ...saleData,
      method: paymentInfo.method,
      time: now.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" }),
      date: now.toLocaleDateString(),
      synced: false,
    };
    setSales(prev => [...prev, localSale]);

    // Save to IndexedDB pending queue
    try {
      await dbPut("pendingSales", saleData);
      setPendingCount(prev => prev + 1);
    } catch (e) { /* continue */ }

    // Try immediate sync if online
    if (online && api.isConfigured()) {
      try {
        const result = await api.post("recordSale", saleData);
        if (result && result.success) {
          await dbDelete("pendingSales", offlineId);
          setPendingCount(prev => Math.max(0, prev - 1));
          // Update the sale in our list to show as synced
          setSales(prev => prev.map(s => s.id === offlineId ? { ...s, id: result.saleId, synced: true } : s));
        }
      } catch (e) { /* Will sync later */ }
    }

    setCart([]);
    setShowPayment(false);
  };

  // Manual sync trigger
  const handleManualSync = async () => {
    if (!online || !api.isConfigured()) return;
    const result = await syncPendingSales();
    if (result.synced > 0) {
      const remaining = await dbGetAll("pendingSales");
      setPendingCount(remaining.length);
    }
    await refreshProducts();
  };

  // Dashboard navigation handler
  const handleNavigate = (tab) => {
    if (tab === "inventory-add") {
      setActiveTab("inventory");
      setAutoOpenAdd(true);
    } else if (tab === "purchases") {
      setActiveTab("inventory");
    } else if (tab === "settings") {
      setShowSettings(true);
    } else {
      setActiveTab(tab);
    }
  };

  if (!loggedIn) return <LoginScreen onLogin={(u) => { setUser(u); setLoggedIn(true); }} />;

  const tabs = [
    { id: "dashboard", label: "Home", icon: <svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> },
    { id: "pos", label: "Sell", icon: <svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="12" y1="7" x2="12" y2="17"/></svg> },
    { id: "inventory", label: "Stock", icon: <svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg> },
    { id: "history", label: "Sales", icon: <svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg> },
  ];

  return (
    <div className="h-screen flex flex-col bg-zinc-950 text-zinc-100 overflow-hidden" style={{ background: "linear-gradient(180deg, rgba(24,24,27,1) 0%, rgba(9,9,11,1) 100%)" }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />

      {/* Side Drawer */}
      <SideDrawer
        open={showDrawer}
        onClose={() => setShowDrawer(false)}
        user={user}
        activeTab={activeTab}
        onNavigate={handleNavigate}
        onLogout={() => { setLoggedIn(false); setUser(null); setCart([]); }}
        online={online}
        pendingCount={pendingCount}
        syncing={syncing}
        source={source}
        onSync={handleManualSync}
      />

      {/* Header */}
      <header className="flex items-center justify-between px-4 py-3 border-b border-zinc-800/50 bg-zinc-950/80 backdrop-blur-sm">
        <div className="flex items-center gap-3">
          {/* Hamburger */}
          <button onClick={() => setShowDrawer(true)} className="w-9 h-9 rounded-xl bg-zinc-800/80 border border-zinc-700/40 flex flex-col items-center justify-center gap-1.5 active:scale-90 transition-all">
            <span className="w-4 h-0.5 bg-zinc-300 rounded-full" />
            <span className="w-4 h-0.5 bg-zinc-300 rounded-full" />
            <span className="w-3 h-0.5 bg-zinc-300 rounded-full self-start ml-2.5" />
          </button>
          <div>
            <h1 className="text-sm font-bold text-zinc-100 leading-none" style={{ fontFamily: "'DM Sans', sans-serif" }}>Oola RetailFlow</h1>
            <p className="text-xs text-zinc-500 leading-none mt-0.5">{(user && user.name ? user.name : "User")} • {new Date().toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" })}</p>
          </div>
        </div>

        <div className="flex items-center gap-2">
          {/* Connection & Sync Status */}
          <button onClick={handleManualSync} className="flex items-center gap-1.5 px-2 py-1 rounded-lg hover:bg-zinc-800 transition-all" title={online ? "Online" : "Offline"}>
            <span className={`w-2 h-2 rounded-full ${online ? "bg-emerald-400 shadow shadow-emerald-400/50" : "bg-red-400 shadow shadow-red-400/50"} ${syncing ? "animate-pulse" : ""}`} />
            {pendingCount > 0 && (
              <span className="flex items-center gap-0.5 text-xs text-amber-400 font-medium">
                <svg width="12" height="12" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" className={syncing ? "animate-spin" : ""}><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>
                {pendingCount}
              </span>
            )}
            <span className={`text-xs px-1.5 py-0.5 rounded font-medium ${source === "api" ? "bg-emerald-500/15 text-emerald-400" : source === "cache" ? "bg-blue-500/15 text-blue-400" : "bg-zinc-700 text-zinc-400"}`}>
              {source === "api" ? "Live" : source === "cache" ? "Cached" : "Demo"}
            </span>
          </button>

          {/* Settings */}
          <button onClick={() => setShowSettings(!showSettings)} className="text-zinc-500 hover:text-zinc-300 p-1 rounded-lg hover:bg-zinc-800 transition-all">
            <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          </button>
        </div>
      </header>

      {/* Offline Banner */}
      {!online && (
        <div className="bg-amber-500/10 border-b border-amber-500/20 px-4 py-2 flex items-center gap-2">
          <span className="text-amber-400 text-sm">⚡</span>
          <p className="text-xs text-amber-300 flex-1">You're offline — sales are saved locally and will sync when internet returns</p>
          {pendingCount > 0 && <span className="text-xs font-bold text-amber-400">{pendingCount} pending</span>}
        </div>
      )}

      {/* Settings Dropdown */}
      {showSettings && (
        <SettingsPanel
          online={online} source={source} pendingCount={pendingCount}
          products={products} setProducts={setProducts}
          setSales={setSales} setPendingCount={setPendingCount}
          refreshProducts={refreshProducts}
          onSync={() => { handleManualSync(); }}
          onClose={() => setShowSettings(false)}
        />
      )}

      {/* Loading indicator */}
      {loading && (
        <div className="flex items-center justify-center py-8">
          <div className="w-8 h-8 border-3 border-amber-500 border-t-transparent rounded-full animate-spin" />
        </div>
      )}

      {/* Content */}
      <main className="flex-1 overflow-hidden">
        {activeTab === "dashboard" && <DashboardScreen sales={sales} products={products} user={user} onNavigate={handleNavigate} />}
        {activeTab === "pos" && <POSScreen products={products} cart={cart} setCart={setCart} onComplete={() => setShowPayment(true)} />}
        {activeTab === "inventory" && <InventoryScreen products={products} setProducts={setProducts} refreshProducts={refreshProducts} user={user} autoOpenAdd={autoOpenAdd} onAddOpened={() => setAutoOpenAdd(false)} />}
        {activeTab === "history" && <HistoryScreen sales={sales} />}
      </main>

      <nav className="flex border-t border-zinc-800/50 bg-zinc-950/95 backdrop-blur-sm px-2 pb-1 pt-1">
        {tabs.map(tab => (
          <button key={tab.id} onClick={() => setActiveTab(tab.id)}
            className={`flex-1 flex flex-col items-center py-2 gap-0.5 transition-all relative ${activeTab === tab.id ? "text-amber-400" : "text-zinc-600 hover:text-zinc-400"}`}>
            {activeTab === tab.id && <div className="absolute -top-1 w-8 h-0.5 rounded-full bg-amber-400" />}
            {tab.icon}
            <span className="text-xs font-medium">{tab.label}</span>
            {tab.id === "pos" && cartCount > 0 && <span className="absolute top-1 right-1/4 bg-amber-500 text-zinc-900 text-xs font-bold rounded-full w-4 h-4 flex items-center justify-center">{cartCount}</span>}
          </button>
        ))}
      </nav>

      {showPayment && <PaymentModal cart={cart} total={cartTotal} onClose={() => setShowPayment(false)} onConfirm={handleCompleteSale} />}
    </div>
  );
}

// Render the app
document.getElementById('ld').style.display = 'none';
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(RetailFlowPOS));
    </script>
    <script>
        if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){})}
    </script>
</body>
</html>
